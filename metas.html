<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FinTrack Pro · Metas</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="premium.js"></script>
<style>
:root{--g-dark:#0F5132;--g-main:#1A7A4A;--g-light:#E8F7EF;--white:#fff;--off:#F7F8FC;--border:#E4E6F0;--text:#1A1D2E;--text2:#4A4E69;--text3:#9395A5;--red:#E63946;--red-dim:rgba(230,57,70,.1);--amber:#F4A261;--amb-dim:rgba(244,162,97,.12);--blue:#4A6CF7;--shadow:0 2px 12px rgba(0,0,0,.06);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--off);color:var(--text);min-height:100vh;padding-bottom:90px;}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-title{font-size:17px;font-weight:800;}
.page{padding:16px;}
.card{background:var(--white);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:var(--shadow);}
.lang-toggle{display:flex;background:var(--off);border:1px solid var(--border);border-radius:20px;overflow:hidden;font-size:11px;font-weight:700;}
.lt-opt{padding:5px 12px;cursor:pointer;color:var(--text3);}
.lt-opt.on{background:var(--g-main);color:white;}
.btn{border:none;border-radius:12px;padding:11px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-primary{background:var(--g-main);color:white;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;place-items:center;z-index:150;}
.overlay.open{display:grid;}
.modal{background:var(--white);border-radius:20px;width:min(480px,calc(100vw - 24px));max-height:88vh;overflow-y:auto;padding:20px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.field input,.field select{width:100%;background:var(--off);border:1.5px solid var(--border);border-radius:10px;padding:11px 13px;font-size:14px;font-family:inherit;outline:none;}
.field input:focus,.field select:focus{border-color:var(--g-main);}
.goal-card{background:var(--white);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.goal-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.goal-ico{width:44px;height:44px;border-radius:13px;display:grid;place-items:center;font-size:22px;}
.goal-actions{display:flex;gap:6px;margin-top:10px;}
.mob-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:100;gap:0;}
.mob-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:700;color:var(--text3);cursor:pointer;padding:4px 0;}
.mob-item.on{color:var(--g-main);}
.mob-ico{font-size:22px;line-height:1.2;}
.mob-plus{width:52px;height:52px;border-radius:50%;background:var(--g-main);display:flex;align-items:center;justify-content:center;font-size:26px;color:white;margin-top:-18px;box-shadow:0 4px 14px rgba(26,122,74,.4);}
.more-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:flex-end;z-index:200;}
.more-overlay.open{display:flex;}
.more-panel{background:var(--white);width:100%;border-radius:24px 24px 0 0;padding:12px 20px calc(28px + env(safe-area-inset-bottom));}
.more-handle{width:36px;height:4px;background:var(--border);border-radius:100px;margin:0 auto 16px;}
.more-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.more-item{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
.more-ico{width:52px;height:52px;border-radius:16px;display:grid;place-items:center;font-size:24px;}
.more-item span{font-size:11px;font-weight:600;color:var(--text2);text-align:center;}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1A1D2E;color:white;padding:12px 20px;border-radius:20px;font-size:13px;font-weight:600;display:none;z-index:300;}

input, select, textarea { font-size: 16px !important; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">🎯 <span data-es="Mis Metas" data-en="My Goals">Mis Metas</span></div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="lang-toggle">
      <div class="lt-opt on" id="ltES" onclick="setLang('es')">ES</div>
      <div class="lt-opt" id="ltEN" onclick="setLang('en')">EN</div>
    </div>
    <button class="btn btn-primary" onclick="openAddModal()" style="padding:8px 14px" data-es="+ Nueva meta" data-en="+ New goal">+ Nueva meta</button>
  </div>
</div>

<div class="page" id="goalsList"></div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-size:16px;font-weight:800" id="modalTitle">Nueva meta</div>
      <div onclick="closeModal()" style="cursor:pointer;font-size:20px;color:var(--text3)">✕</div>
    </div>
    <div class="field">
      <label data-es="Nombre de la meta" data-en="Goal name">Nombre</label>
      <input type="text" id="fName" placeholder="ej. Vacaciones, Auto nuevo...">
    </div>
    <div class="field">
      <label data-es="Meta total ($)" data-en="Target amount ($)">Meta total ($)</label>
      <input type="number" id="fTarget" placeholder="0.00" min="0" step="0.01">
    </div>
    <div class="field">
      <label data-es="Ahorrado hasta ahora ($)" data-en="Saved so far ($)">Ahorrado hasta ahora ($)</label>
      <input type="number" id="fSaved" placeholder="0.00" min="0" step="0.01">
    </div>
    <div class="field">
      <label data-es="Fecha límite (opcional)" data-en="Deadline (optional)">Fecha límite</label>
      <input type="date" id="fDeadline">
    </div>
    <div class="field">
      <label data-es="Ícono" data-en="Icon">Ícono</label>
      <select id="fIcon">
        <option value="🎯">🎯 Meta</option>
        <option value="🚗">🚗 Auto</option>
        <option value="✈️">✈️ Viaje</option>
        <option value="🏠">🏠 Casa</option>
        <option value="🎓">🎓 Educación</option>
        <option value="💍">💍 Anillo/Boda</option>
        <option value="📱">📱 Gadget</option>
        <option value="🛡️">🛡️ Emergencia</option>
        <option value="💰">💰 Ahorro general</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="saveGoal()" style="width:100%;margin-bottom:8px" data-es="Guardar meta" data-en="Save goal">Guardar meta</button>
    <button class="btn" style="width:100%;background:var(--off);border:1.5px solid var(--border)" onclick="closeModal()" data-es="Cancelar" data-en="Cancel">Cancelar</button>
  </div>
</div>

<!-- ABONAR MODAL -->
<div class="overlay" id="abonarOverlay" onclick="if(event.target===this)closeAbonarModal()">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-size:16px;font-weight:800" data-es="Abonar a meta" data-en="Add to goal">Abonar a meta</div>
      <div onclick="closeAbonarModal()" style="cursor:pointer;font-size:20px;color:var(--text3)">✕</div>
    </div>
    <div class="field">
      <label data-es="Monto a abonar ($)" data-en="Amount to add ($)">Monto ($)</label>
      <input type="number" id="aAmount" placeholder="0.00" min="0" step="0.01">
    </div>
    <button class="btn btn-primary" onclick="confirmAbonar()" style="width:100%;margin-bottom:8px">Abonar</button>
    <button class="btn" style="width:100%;background:var(--off);border:1.5px solid var(--border)" onclick="closeAbonarModal()">Cancelar</button>
  </div>
</div>

<div id="toast"></div>

<!-- MORE MENU -->
<div class="more-overlay" id="moreOverlay" onclick="if(event.target===this)closeMoreMenu()">
  <div class="more-panel">
    <div class="more-handle"></div>
    <div class="more-grid">
      <div class="more-item" onclick="go('analisis.html')"><div class="more-ico" style="background:var(--g-light)">📈</div><span>Análisis</span></div>
      <div class="more-item" onclick="go('metas.html')"><div class="more-ico" style="background:var(--amb-dim)">🎯</div><span>Metas</span></div>
      <div class="more-item" onclick="go('deudas.html')"><div class="more-ico" style="background:var(--red-dim)">💳</div><span>Deudas</span></div>
      <div class="more-item" onclick="go('inversiones.html')"><div class="more-ico" style="background:var(--blu-dim)">🏦</div><span>Inversiones</span></div>
      <div class="more-item" onclick="go('scanner.html')"><div class="more-ico" style="background:rgba(123,94,167,.1)">📷</div><span>Escanear</span></div>
      <div class="more-item" onclick="go('importar.html')"><div class="more-ico" style="background:var(--blu-dim)">📥</div><span>Importar CSV</span></div>
      <div class="more-item" onclick="go('emergencia.html')"><div class="more-ico" style="background:var(--amb-dim)">🛡️</div><span>Emergencia</span></div>
      <div class="more-item" onclick="go('suscripciones.html')"><div class="more-ico" style="background:rgba(123,94,167,.1)">🔄</div><span>Suscripciones</span></div>
      <div class="more-item" onclick="go('config.html')"><div class="more-ico" style="background:var(--off)">⚙️</div><span>Config</span></div>
      <div class="more-item" onclick="go('perfil.html')"><div class="more-ico" style="background:var(--blu-dim)">👤</div><span>Perfil</span></div>
    </div>
  </div>
</div>

<nav class="mob-nav">
  <div class="mob-item" onclick="go('dashboard.html')"><div class="mob-ico">📊</div><span>Inicio</span></div>
  <div class="mob-item" onclick="go('historial.html')"><div class="mob-ico">📅</div><span>Historial</span></div>
  <div class="mob-item" onclick="go('dashboard.html')"><div class="mob-plus">＋</div></div>
  <div class="mob-item" onclick="go('hogar.html')"><div class="mob-ico">🏠</div><span>Hogar</span></div>
  <div class="mob-item" onclick="openMoreMenu()"><div class="mob-ico">☰</div><span>Más</span></div>
</nav>

<script>
let user = {}, lang = 'es';
let editingId = null;
let abonarId  = null;
const GOALS_KEY = 'ft_goals';

function loadGoals(){ try{return JSON.parse(localStorage.getItem(GOALS_KEY))||[];}catch(e){return[];} }
function saveGoals(d){ localStorage.setItem(GOALS_KEY,JSON.stringify(d)); }
function fmt(n){ return '$'+Math.abs(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function go(url){ window.location.href=url; }
function logout(){sessionStorage.clear();['ft_user','ft_user_setup','ft_premium','ft_lang'].forEach(k=>localStorage.removeItem(k));window.location.replace('login.html');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',3000);}
function openMoreMenu(){document.getElementById('moreOverlay').classList.add('open');}
function closeMoreMenu(){document.getElementById('moreOverlay').classList.remove('open');}
function checkHogar(){ try{const h=JSON.parse(localStorage.getItem('ft_hogar')||'{}');return h.connected===true&&!h.manuallyLeft;}catch(e){return false;} }

function setLang(l){
  lang=l; localStorage.setItem('ft_lang',l);
  document.getElementById('ltES').classList.toggle('on',l==='es');
  document.getElementById('ltEN').classList.toggle('on',l==='en');
  document.querySelectorAll('[data-es]').forEach(el=>{const v=el.getAttribute('data-'+l);if(v)el.textContent=v;});
  render();
}

function render(){
  const goals = loadGoals();
  const es = lang==='es';
  const list = document.getElementById('goalsList');

  if(!goals.length){
    list.innerHTML = `<div style="text-align:center;padding:60px 20px"><div style="font-size:48px;margin-bottom:12px">🎯</div><div style="font-size:16px;font-weight:800;margin-bottom:6px">${es?'Sin metas aún':'No goals yet'}</div><div style="font-size:13px;color:var(--text3)">${es?'Crea tu primera meta de ahorro':'Create your first savings goal'}</div></div>`;
    return;
  }

  list.innerHTML = goals.map(g=>{
    const saved = parseFloat(g.saved)||0;
    const target = parseFloat(g.target)||1;
    const pct = Math.min(Math.round((saved/target)*100),100);
    const remaining = Math.max(0,target-saved);
    const done = pct>=100;
    const color = done?'var(--g-main)':'var(--amber)';
    return `
    <div class="goal-card" style="border-left:4px solid ${color}">
      <div class="goal-header">
        <div class="goal-ico" style="background:${done?'var(--g-light)':'var(--amb-dim)'};">${g.icon||'🎯'}</div>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:800">${g.name||'Meta'}</div>
          <div style="font-size:11px;color:var(--text3)">${fmt(saved)} ${es?'de':'of'} ${fmt(target)}</div>
        </div>
        <div style="font-size:16px;font-weight:800;color:${color}">${pct}%</div>
      </div>
      <div style="background:var(--border);border-radius:100px;height:8px;overflow:hidden;margin-bottom:8px">
        <div style="height:100%;border-radius:100px;background:${color};width:${pct}%;transition:width .8s ease"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:10px">
        <span>${es?'Faltan':'Remaining'}: ${fmt(remaining)}</span>
        ${g.deadline?`<span>${es?'Límite':'Due'}: ${g.deadline}</span>`:''}
      </div>
      ${done?`<div style="background:var(--g-light);color:var(--g-dark);border-radius:10px;padding:8px;font-size:12px;font-weight:700;text-align:center;margin-bottom:8px">🎉 ${es?'¡Meta alcanzada!':'Goal reached!'}</div>`:''}
      <div class="goal-actions">
        <button class="btn btn-primary" onclick="openAbonar('${g.id}')" style="flex:1;padding:9px" data-es="Abonar" data-en="Add">Abonar</button>
        <button class="btn" onclick="openEdit('${g.id}')" style="background:var(--off);border:1.5px solid var(--border);padding:9px 14px">✏️</button>
        <button class="btn" onclick="deleteGoal('${g.id}')" style="background:var(--red-dim);color:var(--red);border:none;padding:9px 14px">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

function openAddModal(){
  editingId=null;
  document.getElementById('fName').value='';
  document.getElementById('fTarget').value='';
  document.getElementById('fSaved').value='';
  document.getElementById('fDeadline').value='';
  document.getElementById('fIcon').value='🎯';
  document.getElementById('modalTitle').textContent=lang==='es'?'Nueva meta':'New goal';
  document.getElementById('overlay').classList.add('open');
}
function openEdit(id){
  const g = loadGoals().find(g=>g.id===id);
  if(!g) return;
  editingId=id;
  document.getElementById('fName').value=g.name||'';
  document.getElementById('fTarget').value=g.target||'';
  document.getElementById('fSaved').value=g.saved||'';
  document.getElementById('fDeadline').value=g.deadline||'';
  document.getElementById('fIcon').value=g.icon||'🎯';
  document.getElementById('modalTitle').textContent=lang==='es'?'Editar meta':'Edit goal';
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); editingId=null; }

function saveGoal(){
  const name    = document.getElementById('fName').value.trim();
  const target  = parseFloat(document.getElementById('fTarget').value)||0;
  const saved   = parseFloat(document.getElementById('fSaved').value)||0;
  const deadline= document.getElementById('fDeadline').value;
  const icon    = document.getElementById('fIcon').value;
  const es=lang==='es';
  if(!name){ showToast(es?'⚠️ Ingresa un nombre':'⚠️ Enter a name'); return; }
  if(!target){ showToast(es?'⚠️ Ingresa una meta':'⚠️ Enter a target'); return; }
  const goals = loadGoals();
  if(editingId){
    const idx=goals.findIndex(g=>g.id===editingId);
    if(idx>=0) goals[idx]={...goals[idx],name,target,saved,deadline,icon};
  } else {
    goals.push({id:'g_'+Date.now(),name,target,saved,deadline,icon,createdAt:new Date().toISOString()});
  }
  saveGoals(goals);
  closeModal();
  render();
  showToast(es?'✅ Meta guardada':'✅ Goal saved');
}

function openAbonar(id){ abonarId=id; document.getElementById('aAmount').value=''; document.getElementById('abonarOverlay').classList.add('open'); }
function closeAbonarModal(){ document.getElementById('abonarOverlay').classList.remove('open'); abonarId=null; }
function confirmAbonar(){
  const amt = parseFloat(document.getElementById('aAmount').value)||0;
  if(!amt){ showToast('⚠️ Ingresa un monto'); return; }
  const goals = loadGoals();
  const idx = goals.findIndex(g=>g.id===abonarId);
  if(idx>=0){ goals[idx].saved=(parseFloat(goals[idx].saved)||0)+amt; }
  saveGoals(goals);
  closeAbonarModal();
  render();
  showToast(lang==='es'?'✅ Abono registrado':'✅ Added to goal');
}

function deleteGoal(id){
  if(!confirm(lang==='es'?'¿Eliminar esta meta?':'Delete this goal?')) return;
  saveGoals(loadGoals().filter(g=>g.id!==id));
  render();
  showToast(lang==='es'?'🗑️ Eliminada':'🗑️ Deleted');
}

(function init(){
  let s=localStorage.getItem('ft_user')||sessionStorage.getItem('ft_user');
  if(!s){ window.location.replace('login.html'); return; }
  try{ user=JSON.parse(s); }catch(e){ window.location.replace('login.html'); return; }
  lang=localStorage.getItem('ft_lang')||user.lang||'es';
  if(!sessionStorage.getItem('ft_user')) sessionStorage.setItem('ft_user',s);
  setLang(lang);
})();
</script>
</body>
</html>
