<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FinTrack Pro · Emergencia</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="premium.js"></script>
<style>
:root{--g-dark:#0F5132;--g-main:#1A7A4A;--g-light:#E8F7EF;--white:#fff;--off:#F7F8FC;--border:#E4E6F0;--text:#1A1D2E;--text2:#4A4E69;--text3:#9395A5;--red:#E63946;--red-dim:rgba(230,57,70,.1);--amber:#F4A261;--amb-dim:rgba(244,162,97,.12);--blue:#4A6CF7;--blu-dim:rgba(74,108,247,.1);--shadow:0 2px 12px rgba(0,0,0,.06);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--off);color:var(--text);min-height:100vh;padding-bottom:90px;}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-title{font-size:17px;font-weight:800;}
.page{padding:16px;}
.card{background:var(--white);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:var(--shadow);}
.lang-toggle{display:flex;background:var(--off);border:1px solid var(--border);border-radius:20px;overflow:hidden;font-size:11px;font-weight:700;}
.lt-opt{padding:5px 12px;cursor:pointer;color:var(--text3);}
.lt-opt.on{background:var(--g-main);color:white;}
.btn{border:none;border-radius:12px;padding:12px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-primary{background:var(--amber);color:white;width:100%;}
.btn-danger{background:var(--red-dim);color:var(--red);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;place-items:center;z-index:150;}
.overlay.open{display:grid;}
.modal{background:var(--white);border-radius:20px;width:min(480px,calc(100vw - 24px));max-height:88vh;overflow-y:auto;padding:20px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.field input{width:100%;background:var(--off);border:1.5px solid var(--border);border-radius:10px;padding:11px 13px;font-size:14px;font-family:inherit;outline:none;}
.field input:focus{border-color:var(--amber);}
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--off);}
.hist-item:last-child{border-bottom:none;}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1A1D2E;color:white;padding:12px 20px;border-radius:20px;font-size:13px;font-weight:600;display:none;z-index:300;}
/* MOBILE NAV */
.mob-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:100;gap:0;}
.mob-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:700;color:var(--text3);cursor:pointer;padding:4px 0;}
.mob-item.on{color:var(--g-main);}
.mob-ico{font-size:22px;line-height:1.2;}
.mob-plus{width:52px;height:52px;border-radius:50%;background:var(--g-main);display:flex;align-items:center;justify-content:center;font-size:26px;color:white;margin-top:-18px;box-shadow:0 4px 14px rgba(26,122,74,.4);}
.more-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:flex-end;z-index:200;}
.more-overlay.open{display:flex;}
.more-panel{background:var(--white);width:100%;border-radius:24px 24px 0 0;padding:12px 20px calc(28px + env(safe-area-inset-bottom));}
.more-handle{width:36px;height:4px;background:var(--border);border-radius:100px;margin:0 auto 16px;}
.more-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.more-item{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
.more-ico{width:52px;height:52px;border-radius:16px;display:grid;place-items:center;font-size:24px;}
.more-item span{font-size:11px;font-weight:600;color:var(--text2);text-align:center;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">🛡️ <span data-es="Fondo de Emergencia" data-en="Emergency Fund">Fondo de Emergencia</span></div>
  <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
    <div class="lang-toggle">
      <div class="lt-opt on" id="ltES" onclick="setLang('es')">ES</div>
      <div class="lt-opt" id="ltEN" onclick="setLang('en')">EN</div>
    </div>
    <button class="btn btn-primary" style="width:auto;padding:8px 12px;font-size:12px;white-space:nowrap;" onclick="openDeposit()" data-es="+ Agregar depósito" data-en="+ Add deposit">+ Agregar depósito</button>
  </div>
</div>

<div class="page">
  <div class="card" id="heroCard"></div>
  <div class="card">
    <div style="font-size:13px;font-weight:800;margin-bottom:12px" data-es="📋 Historial de depósitos" data-en="📋 Deposit history">📋 Historial de depósitos</div>
    <div id="histList"><p style="color:var(--text3);font-size:13px" data-es="Sin depósitos aún" data-en="No deposits yet">Sin depósitos aún</p></div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-size:16px;font-weight:800" id="modalTitle">Agregar depósito</div>
      <div onclick="closeModal()" style="cursor:pointer;font-size:20px;color:var(--text3)">✕</div>
    </div>
    <div class="field">
      <label data-es="Monto ($)" data-en="Amount ($)">Monto ($)</label>
      <input type="number" id="fAmount" placeholder="0.00" min="0" step="0.01">
    </div>
    <div class="field">
      <label data-es="Nota (opcional)" data-en="Note (optional)">Nota (opcional)</label>
      <input type="text" id="fNote" placeholder="">
    </div>
    <div class="field">
      <label data-es="Fecha" data-en="Date">Fecha</label>
      <input type="date" id="fDate">
    </div>
    <button class="btn btn-primary" onclick="saveDeposit()" style="margin-bottom:8px" data-es="Guardar" data-en="Save">Guardar</button>
    <button class="btn" style="width:100%;background:var(--off);border:1.5px solid var(--border)" onclick="closeModal()" data-es="Cancelar" data-en="Cancel">Cancelar</button>
  </div>
</div>

<div id="toast"></div>

<!-- MORE MENU -->
<div class="more-overlay" id="moreOverlay" onclick="if(event.target===this)closeMoreMenu()">
  <div class="more-panel">
    <div class="more-handle"></div>
    <div class="more-grid">
      <div class="more-item" onclick="go('analisis.html')"><div class="more-ico" style="background:var(--g-light)">📈</div><span>Análisis</span></div>
      <div class="more-item" onclick="go('metas.html')"><div class="more-ico" style="background:var(--amb-dim)">🎯</div><span>Metas</span></div>
      <div class="more-item" onclick="go('deudas.html')"><div class="more-ico" style="background:var(--red-dim)">💳</div><span>Deudas</span></div>
      <div class="more-item" onclick="go('inversiones.html')"><div class="more-ico" style="background:var(--blu-dim)">🏦</div><span>Inversiones</span></div>
      <div class="more-item" onclick="go('scanner.html')"><div class="more-ico" style="background:rgba(123,94,167,.1)">📷</div><span>Escanear</span></div>
      <div class="more-item" onclick="go('importar.html')"><div class="more-ico" style="background:var(--blu-dim)">📥</div><span>Importar CSV</span></div>
      <div class="more-item" onclick="go('emergencia.html')"><div class="more-ico" style="background:var(--amb-dim)">🛡️</div><span>Emergencia</span></div>
      <div class="more-item" onclick="go('suscripciones.html')"><div class="more-ico" style="background:rgba(123,94,167,.1)">🔄</div><span>Suscripciones</span></div>
      <div class="more-item" onclick="go('config.html')"><div class="more-ico" style="background:var(--off)">⚙️</div><span>Config</span></div>
      <div class="more-item" onclick="go('perfil.html')"><div class="more-ico" style="background:var(--blu-dim)">👤</div><span>Perfil</span></div>
    </div>
  </div>
</div>

<!-- MOBILE NAV -->
<nav class="mob-nav">
  <div class="mob-item" onclick="go('dashboard.html')"><div class="mob-ico">📊</div><span>Inicio</span></div>
  <div class="mob-item" onclick="go('historial.html')"><div class="mob-ico">📅</div><span>Historial</span></div>
  <div class="mob-item" onclick="go('dashboard.html')"><div class="mob-plus">＋</div></div>
  <div class="mob-item" onclick="go('hogar.html')"><div class="mob-ico">🏠</div><span>Hogar</span></div>
  <div class="mob-item" onclick="openMoreMenu()"><div class="mob-ico">☰</div><span>Más</span></div>
</nav>

<script>
let user = {}, lang = 'es';
const EMERG_KEY = 'ft_data';
const HIST_KEY  = 'ft_emerg_hist';

function loadData(){ try{return JSON.parse(localStorage.getItem(EMERG_KEY))||{transactions:[],emergency:0,subscriptions:[]};}catch(e){return{transactions:[],emergency:0,subscriptions:[]};} }
function saveData(d){ localStorage.setItem(EMERG_KEY,JSON.stringify(d)); }
function loadHist(){ try{return JSON.parse(localStorage.getItem(HIST_KEY))||[];}catch(e){return[];} }
function saveHist(d){ localStorage.setItem(HIST_KEY,JSON.stringify(d)); }
function fmt(n){ return '$'+Math.abs(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function go(url){ window.location.href=url; }
function logout(){sessionStorage.clear();['ft_user','ft_user_setup','ft_premium','ft_lang'].forEach(k=>localStorage.removeItem(k));window.location.replace('login.html');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',3000);}
function openMoreMenu(){document.getElementById('moreOverlay').classList.add('open');}
function closeMoreMenu(){document.getElementById('moreOverlay').classList.remove('open');}

function setLang(l){
  lang=l; localStorage.setItem('ft_lang',l);
  document.getElementById('ltES').classList.toggle('on',l==='es');
  document.getElementById('ltEN').classList.toggle('on',l==='en');
  document.querySelectorAll('[data-es]').forEach(el=>{const v=el.getAttribute('data-'+l);if(v)el.textContent=v;});
  render();
}

function render(){
  const d = loadData();
  const bal = parseFloat(d.emergency)||0;
  const inc = parseFloat(user.income)||3000;
  const target = inc * 3;
  const pct = Math.min(Math.round((bal/target)*100),100);
  const es = lang==='es';

  document.getElementById('heroCard').innerHTML = `
    <div style="text-align:center;padding:8px 0 16px">
      <div style="font-size:11px;color:var(--text3);margin-bottom:4px">${es?'Saldo actual':'Current balance'}</div>
      <div style="font-size:36px;font-weight:800;color:var(--amber);letter-spacing:-.5px">${fmt(bal)}</div>
      <div style="font-size:12px;color:var(--text3);margin-top:4px">${es?'Meta':'Goal'}: ${fmt(target)} (${es?'3 meses de ingreso':'3 months income'})</div>
    </div>
    <div style="background:var(--border);border-radius:100px;height:10px;overflow:hidden;margin-bottom:8px">
      <div style="height:100%;border-radius:100px;background:var(--amber);width:${pct}%;transition:width .8s ease"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3)">
      <span>${pct}% ${es?'completado':'complete'}</span>
      <span>${es?'Faltan':'Remaining'}: ${fmt(Math.max(0,target-bal))}</span>
    </div>
    ${pct>=100?`<div style="background:var(--g-light);color:var(--g-dark);border-radius:10px;padding:10px;margin-top:12px;font-size:12px;font-weight:600;text-align:center">🎉 ${es?'¡Meta alcanzada!':'Goal reached!'}</div>`:''}
  `;

  const hist = loadHist();
  const list = document.getElementById('histList');
  if(!hist.length){
    list.innerHTML = `<p style="color:var(--text3);font-size:13px;text-align:center;padding:16px 0">${es?'Sin depósitos aún':'No deposits yet'}</p>`;
    return;
  }
  list.innerHTML = hist.slice().reverse().map(h=>`
    <div class="hist-item">
      <div>
        <div style="font-size:13px;font-weight:700">${h.note||( es?'Depósito':'Deposit')}</div>
        <div style="font-size:11px;color:var(--text3)">${h.date}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div style="font-size:14px;font-weight:800;color:${h.amount<0?'var(--red)':'var(--g-main)'}">${h.amount<0?'-':'+'} ${fmt(Math.abs(h.amount))}</div>
        <div onclick="deleteDeposit('${h.id}')" style="cursor:pointer;color:var(--text3);font-size:16px">🗑️</div>
      </div>
    </div>
  `).join('');
}

function openDeposit(){
  document.getElementById('fAmount').value='';
  document.getElementById('fNote').value='';
  document.getElementById('fDate').value=new Date().toISOString().slice(0,10);
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); }

function saveDeposit(){
  const amount = parseFloat(document.getElementById('fAmount').value)||0;
  const note   = document.getElementById('fNote').value.trim();
  const date   = document.getElementById('fDate').value || new Date().toISOString().slice(0,10);
  if(!amount){ showToast(lang==='es'?'⚠️ Ingresa un monto':'⚠️ Enter an amount'); return; }

  const d = loadData();
  d.emergency = (parseFloat(d.emergency)||0) + amount;
  saveData(d);

  const hist = loadHist();
  hist.push({ id:'h_'+Date.now(), amount, note, date });
  saveHist(hist);

  closeModal();
  render();
  showToast(lang==='es'?'✅ Depósito guardado':'✅ Deposit saved');
}

function deleteDeposit(id){
  if(!confirm(lang==='es'?'¿Eliminar este depósito?':'Delete this deposit?')) return;
  const hist = loadHist();
  const item = hist.find(h=>h.id===id);
  if(item){
    const d = loadData();
    d.emergency = Math.max(0,(parseFloat(d.emergency)||0) - item.amount);
    saveData(d);
  }
  saveHist(hist.filter(h=>h.id!==id));
  render();
  showToast(lang==='es'?'🗑️ Eliminado':'🗑️ Deleted');
}

(function init(){
  let s = localStorage.getItem('ft_user') || sessionStorage.getItem('ft_user');
  if(!s){ window.location.replace('login.html'); return; }
  try{ user=JSON.parse(s); }catch(e){ window.location.replace('login.html'); return; }
  lang = localStorage.getItem('ft_lang')||user.lang||'es';
  if(!sessionStorage.getItem('ft_user')) sessionStorage.setItem('ft_user',s);
  setLang(lang);
})();
</script>
</body>
</html>
