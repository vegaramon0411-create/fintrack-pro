<script>
/* ─── openMoreMenu universal ─── */
function setLang(l){
  lang=l; localStorage.setItem('ft_lang',l);
  document.getElementById('ltES')?.classList.toggle('on',l==='es');
  document.getElementById('ltEN')?.classList.toggle('on',l==='en');
  document.querySelectorAll('[data-es]').forEach(el=>{const v=el.getAttribute('data-'+l);if(v)el.textContent=v;});
}
function openMoreMenu(){
  if(document.getElementById('_moreOv')) return;
  const links=[
    {ico:'📈',l:'An\u00e1lisis',    u:'analisis.html'},
    {ico:'🎯',l:'Metas',       u:'metas.html'},
    {ico:'💳',l:'Deudas',      u:'deudas.html'},
    {ico:'🏦',l:'Inversiones', u:'inversiones.html'},
    {ico:'📷',l:'Escanear',    u:'scanner.html'},
    {ico:'📥',l:'Importar CSV',u:'importar.html'},
    {ico:'🛡\ufe0f',l:'Emergencia',  u:'emergencia.html'},
    {ico:'🔄',l:'Suscripciones',u:'suscripciones.html'},
    {ico:'\u2699\ufe0f',l:'Config',      u:'config.html'},
    {ico:'👤',l:'Perfil',      u:'perfil.html'},
  ];
  const ov=document.createElement('div');
  ov.id='_moreOv';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:flex-end;';
  ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
  ov.innerHTML='<div style="background:white;border-radius:24px 24px 0 0;padding:16px 20px calc(20px + env(safe-area-inset-bottom));width:100%;"><div style="width:36px;height:4px;background:#ddd;border-radius:100px;margin:0 auto 16px;"></div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px 8px;">'+
    links.map(function(k){return '<div onclick="window.location.href=\''+k.u+'\'" style="display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;"><div style="width:52px;height:52px;background:#f5f5f7;border-radius:14px;display:grid;place-items:center;font-size:24px;">'+k.ico+'</div><span style="font-size:10px;font-weight:600;color:#4A4E69;text-align:center;">'+k.l+'</span></div>';}).join('')+
    '</div></div>';
  document.body.appendChild(ov);
}
</script>
<style>
:root{
  --g-dark:#0F5132;--g-main:#1A7A4A;--g-light:#E8F7EF;
  --white:#fff;--off:#F7F8FC;--border:#E4E6F0;
  --text:#1A1D2E;--text2:#4A4E69;--text3:#9395A5;
  --red:#E63946;--red-dim:rgba(230,57,70,.1);
  --amber:#F4A261;--amb-dim:rgba(244,162,97,.12);
  --blue:#4A6CF7;--blu-dim:rgba(74,108,247,.1);
  --shadow:0 2px 12px rgba(0,0,0,.06);
  --shadow-md:0 4px 24px rgba(0,0,0,.09);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--off);color:var(--text);min-height:100vh;}

/* TOPBAR */
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.tb-left{display:flex;align-items:center;gap:10px;}
.tb-back{width:36px;height:36px;border-radius:10px;background:var(--off);border:none;cursor:pointer;display:grid;place-items:center;font-size:18px;}
.lang-toggle{display:flex;background:var(--off);border:1px solid var(--border);border-radius:20px;overflow:hidden;font-size:11px;font-weight:700;}
.lt-opt{padding:5px 10px;cursor:pointer;color:var(--text3);}
.lt-opt.on{background:var(--g-main);color:white;}
.tb-title{font-size:16px;font-weight:800;}
.tb-subtitle{font-size:11px;color:var(--text3);margin-top:1px;}

/* STEPS */
.steps{display:flex;gap:0;padding:20px 16px 0;max-width:700px;margin:0 auto;}
.step{flex:1;text-align:center;position:relative;}
.step::after{content:'';position:absolute;top:14px;left:50%;width:100%;height:2px;background:var(--border);z-index:0;}
.step:last-child::after{display:none;}
.step-dot{width:28px;height:28px;border-radius:50%;background:var(--border);color:var(--text3);font-size:11px;font-weight:800;display:grid;place-items:center;margin:0 auto 6px;position:relative;z-index:1;transition:all .2s;}
.step.done .step-dot{background:var(--g-main);color:white;}
.step.active .step-dot{background:var(--g-dark);color:white;box-shadow:0 0 0 4px rgba(15,81,50,.15);}
.step-label{font-size:10px;font-weight:600;color:var(--text3);}
.step.active .step-label{color:var(--g-main);}
.step.done .step-label{color:var(--g-main);}

/* MAIN */
.page{padding:16px;max-width:700px;margin:0 auto;padding-bottom:40px;}

/* CARDS */
.card{background:var(--white);border-radius:16px;padding:20px;margin-bottom:14px;box-shadow:var(--shadow);}
.card-title{font-size:14px;font-weight:800;margin-bottom:4px;}
.card-sub{font-size:12px;color:var(--text3);margin-bottom:16px;}

/* FORMAT SELECTOR */
.format-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fmt-card{border:2px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:all .15s;background:var(--white);}
.fmt-card:hover{border-color:var(--g-main);background:var(--g-light);}
.fmt-card.selected{border-color:var(--g-main);background:var(--g-light);}
.fmt-ico{font-size:28px;margin-bottom:8px;}
.fmt-name{font-size:13px;font-weight:800;margin-bottom:3px;}
.fmt-sub{font-size:11px;color:var(--text3);}

/* UPLOAD ZONE */
.upload-zone{border:2px dashed var(--border);border-radius:14px;padding:32px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--off);}
.upload-zone:hover,.upload-zone.drag{border-color:var(--g-main);background:var(--g-light);}
.upload-zone input{display:none;}
.uz-ico{font-size:36px;margin-bottom:10px;}
.uz-title{font-size:14px;font-weight:700;margin-bottom:4px;}
.uz-sub{font-size:12px;color:var(--text3);}

/* AI CREDITS BADGE */
.credits-badge{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--g-dark),var(--g-main));color:white;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;font-weight:600;}
.credits-badge .cb-num{font-size:20px;font-weight:800;margin-left:auto;}

/* REVIEW TABLE */
.review-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.rf-chip{background:var(--off);border:1.5px solid var(--border);border-radius:20px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;color:var(--text3);transition:all .15s;}
.rf-chip.on{background:var(--g-main);border-color:var(--g-main);color:white;}

.tx-review-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--off);transition:background .1s;}
.tx-review-row:last-child{border-bottom:none;}
.trr-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);display:grid;place-items:center;cursor:pointer;flex-shrink:0;transition:all .15s;}
.trr-check.on{background:var(--g-main);border-color:var(--g-main);}
.trr-status{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.trr-info{flex:1;min-width:0;}
.trr-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.trr-meta{font-size:10px;color:var(--text3);margin-top:1px;}
.trr-amt{font-size:13px;font-weight:800;flex-shrink:0;}
.trr-cat{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;flex-shrink:0;}

/* ZELLE DECISION */
.zelle-opts{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.zo-btn{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;border:1.5px solid var(--border);cursor:pointer;background:var(--white);color:var(--text2);transition:all .1s;}
.zo-btn.on{background:var(--g-main);border-color:var(--g-main);color:white;}

/* SUMMARY BOX */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.sum-card{background:var(--off);border-radius:12px;padding:14px;text-align:center;}
.sum-val{font-size:20px;font-weight:800;margin-bottom:3px;}
.sum-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;}

/* DUPLICATE WARNING */
.dup-warn{background:#FFF3E0;border:1px solid #FAD9B5;border-radius:10px;padding:10px 12px;font-size:11px;color:#7A3B0A;margin-top:6px;display:flex;align-items:center;gap:8px;}

/* BUTTONS */
.btn-primary{background:linear-gradient(135deg,var(--g-dark),var(--g-main));color:white;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;transition:opacity .15s;}
.btn-primary:hover{opacity:.9;}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.btn-secondary{background:var(--off);border:1.5px solid var(--border);color:var(--text2);border-radius:12px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:white;padding:12px 20px;border-radius:20px;font-size:13px;font-weight:600;display:none;z-index:200;white-space:nowrap;}

/* MOBILE NAV */
/* ─── MOBILE NAV ─── */
.mob-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:100;align-items:center;}
.mob-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:600;color:var(--text3);cursor:pointer;-webkit-tap-highlight-color:transparent;}
.mob-item.on{color:var(--g-main);}
.mob-item.mob-center{flex:1.2;}
.mob-ico{font-size:21px;line-height:1;}
.mob-add{width:48px;height:48px;background:linear-gradient(135deg,var(--g-dark),var(--g-main));border-radius:50%;border:none;display:grid;place-items:center;color:white;font-size:26px;cursor:pointer;margin-top:-16px;box-shadow:0 4px 16px rgba(15,81,50,.35);-webkit-tap-highlight-color:transparent;}
@media(min-width:700px){.mob-nav{display:none!important;}}
</style>
</head>

<script>

/* ── RESTORED UTILS ── */
function loadDebts(){ try{return JSON.parse(localStorage.getItem('ft_debts'))||[];}catch(e){return[];} }
function saveDebts(d){ localStorage.setItem('ft_debts',JSON.stringify(d)); }
function fmtD(n){ return '$'+Math.abs(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
/* ═══════════════════════════════════════════
   FinTrack Pro — Importador Inteligente
   Soporta: CSV manual, SoFi, Capital One, Fidelity
   + IA (foto/PDF) para usuarios Premium
═══════════════════════════════════════════ */

const STORE_KEY = 'ft_data';
const INV_KEY   = 'ft_investments';

let lang = 'es';
let user = {};
let step = 1;
let importMode = null;   // 'bank' | 'fidelity' | 'manual' | 'ai'
let importIsHogar = false;
let parsedRows = [];     // all detected rows
let reviewRows = [];     // rows after classification
let activeFilter = 'all';

function isHogarConnected(){
  try{ const h=JSON.parse(localStorage.getItem('ft_hogar')||'{}'); return h.connected===true&&!h.manuallyLeft; }
  catch(e){ return false; }
}
function setImportHogar(val){
  importIsHogar=val;
  const bH=document.getElementById('impBtnHogar');
  const bP=document.getElementById('impBtnPersonal');
  const hint=document.getElementById('impHogarHint');
  if(!bH||!bP) return;
  bH.style.background=val?'var(--g-light)':'var(--off)';
  bH.style.borderColor=val?'var(--g-main)':'var(--border)';
  bH.style.color=val?'var(--g-dark)':'';
  bP.style.background=!val?'var(--blu-dim)':'var(--off)';
  bP.style.borderColor=!val?'var(--blue)':'var(--border)';
  bP.style.color=!val?'var(--blue)':'';
  if(hint) hint.textContent=val
    ?(lang==='es'?'Sale del fondo del hogar · visible para tu pareja':'From household fund · visible to partner')
    :(lang==='es'?'Solo tuyo · privado':'Only yours · private');
}

/* ── SESSION ── */
function loadSession() {
  try {
    let s = localStorage.getItem('ft_user') || sessionStorage.getItem('ft_user');
    if (!s) {
      const setup = localStorage.getItem('ft_user_setup');
      if (setup) {
        const fb = {name:'Usuario',email:'',income:3000,currency:'USD',lang:localStorage.getItem('ft_lang')||'es',needs:1500,wants:900,savings:600,setupDone:true,createdAt:new Date().toISOString()};
        try{const gu=JSON.parse(sessionStorage.getItem('ft_google_user')||'{}');if(gu.name)fb.name=gu.name;if(gu.email)fb.email=gu.email;}catch(e){}
        s = JSON.stringify(fb);
        localStorage.setItem('ft_user', s);
        sessionStorage.setItem('ft_user', s);
      } else {
        window.location.replace('login.html'); return;
      }
    }
    user = JSON.parse(s);
    lang = localStorage.getItem('ft_lang') || user.lang || 'es';
    localStorage.setItem('ft_user', s);
    sessionStorage.setItem('ft_user', s);
  } catch(e) {
    try {
      const s = localStorage.getItem('ft_user');
      if (s) { user = JSON.parse(s); lang = localStorage.getItem('ft_lang')||user.lang||'es'; return; }
    } catch(e2) {}
    window.location.replace('login.html');
  }
}

function loadData(){
  try{return JSON.parse(localStorage.getItem(STORE_KEY))||{transactions:[],emergency:0,subscriptions:[]};}
  catch(e){return{transactions:[],emergency:0,subscriptions:[]};}
}
function saveData(d){localStorage.setItem(STORE_KEY,JSON.stringify(d));}

function loadInvestments(){
  try{return JSON.parse(localStorage.getItem(INV_KEY))||[];}catch(e){return[];}
}
function saveInvestments(arr){localStorage.setItem(INV_KEY,JSON.stringify(arr));}

const AI_KEY    = 'ft_ai_credits';
const MAX_AI_PREMIUM = 3;

/* ── AI CREDITS ── */
function getCredits(){
  try{
    const c = JSON.parse(localStorage.getItem(AI_KEY)||'{}');
    const thisMonth = new Date().toISOString().slice(0,7);
    // Nuevo mes: resetear usedThisMonth a 0 (los extra se conservan)
    if(c.month !== thisMonth){
      const reset = {used:0, month:thisMonth, extra:c.extra||0};
      localStorage.setItem(AI_KEY,JSON.stringify(reset));
      return reset;
    }
    return {used:c.used||0, month:thisMonth, extra:c.extra||0};
  } catch(e){ return {used:0, month:new Date().toISOString().slice(0,7), extra:0}; }
}
function useCredit(){
  const c=getCredits();
  // Primero consume los mensuales, luego los extra
  const mensualLeft=Math.max(0,MAX_AI_PREMIUM-c.used);
  if(mensualLeft>0){ c.used++; }
  else if(c.extra>0){ c.extra--; }
  localStorage.setItem(AI_KEY,JSON.stringify(c));
}
function creditsLeft(){
  const prem=typeof isPremium!=='undefined'&&isPremium();
  if(!prem) return 0;
  const c=getCredits();
  const mensual=Math.max(0,MAX_AI_PREMIUM-c.used);
  return mensual+(c.extra||0);
}
function showUpgradeModal(){
  const es=lang==='es';
  const prem=typeof isPremium!=='undefined'&&isPremium();
  const panel=document.getElementById('creditsPanel');
  const title=document.getElementById('creditsPanelTitle');
  const sub=document.getElementById('creditsPanelSub');
  if(title) title.textContent=prem?(es?'Tus créditos IA se agotaron':'Your AI credits ran out'):(es?'Función Premium':'Premium Feature');
  if(sub) sub.textContent=prem?(es?'Usaste tus 3 créditos del mes. Compra más para seguir.':'You used your 3 monthly credits. Buy more to continue.'):(es?'El análisis IA es exclusivo para usuarios Premium.':'AI analysis is exclusive to Premium users.');
  if(panel){panel.style.display='flex';}
  document.getElementById('codeResult').textContent='';
  document.getElementById('codeInputStatic').value='';
}
function activarCodigoCreditos(){
  const es=lang==='es';
  const input=document.getElementById('codeInputStatic');
  const result=document.getElementById('codeResult');
  if(!input) return;
  const code=input.value.trim().toUpperCase();
  if(!code){if(result)result.textContent=es?'⚠️ Escribe el código':'⚠️ Enter the code';return;}
  const match5=code.match(/^FZ5-[A-Z0-9]{4}$/);
  const match15=code.match(/^FZ15-[A-Z0-9]{4}$/);
  const usedCodes=JSON.parse(localStorage.getItem('ft_used_codes')||'[]');
  if(usedCodes.includes(code)){
    if(result)result.textContent=es?'⚠️ Código ya usado':'⚠️ Code already used';
    return;
  }
  if(match5||match15){
    const qty=match15?15:5;
    addExtraCredits(qty);
    usedCodes.push(code);
    localStorage.setItem('ft_used_codes',JSON.stringify(usedCodes));
    if(result){result.style.color='#1A7A4A';result.textContent='✅ +'+qty+' créditos activados';}
    input.value='';
    setTimeout(function(){
      var panel=document.getElementById('creditsPanel');
      if(panel)panel.style.display='none';
      renderStep1();
    },1500);
  } else {
    if(result){result.style.color='#E63946';result.textContent=es?'❌ Código inválido. Ej: FZ5-R4M9':'❌ Invalid code. Ex: FZ5-R4M9';}
  }
}

/* ══════════════════════════════════════
   CSV PARSER — Detecta formato automáticamente
══════════════════════════════════════ */
function parseCSV(text, filename){
  // Clean BOM and normalize line endings
  const clean = text.replace(/^\uFEFF/, '').replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const lines = clean.split('\n').filter(l=>l.trim());

  // Find header line (skip empty/metadata lines at top)
  let headerIdx = 0;
  for(let i=0;i<Math.min(5,lines.length);i++){
    if(lines[i].includes(',') && lines[i].length > 5){
      headerIdx = i;
      break;
    }
  }

  const header = parseCSVLine(lines[headerIdx]).map(h=>h.trim().toLowerCase());

  // Detect format
  if(header.includes('symbol') || header.includes('action')){
    importMode = 'fidelity';
    parseFidelity(header, lines.slice(headerIdx+1));
  } else if(header.includes('account name') || header.includes('primary category')){
    importMode = 'bank';
    parseSoFi(header, lines.slice(headerIdx+1));
  } else if(header.includes('fecha') || header.includes('monto') || header.includes('descripción')){
    importMode = 'manual';
    parseManual(header, lines.slice(headerIdx+1));
  } else {
    // Unknown format — try generic
    parseGeneric(header, lines.slice(headerIdx+1));
  }
}

function parseCSVLine(line){
  const result = [];
  let cur = '';
  let inQ = false;
  for(let i=0;i<line.length;i++){
    const c = line[i];
    if(c==='"' && !inQ){ inQ=true; continue; }
    if(c==='"' && inQ){ inQ=false; continue; }
    if(c===',' && !inQ){ result.push(cur.trim()); cur=''; continue; }
    cur += c;
  }
  result.push(cur.trim());
  return result;
}

function parseAmount(str){
  if(!str) return 0;
  // Handle --$20.00, -$20.00, $20.00, 20.00, -20.00
  const clean = String(str).replace(/--/,'-').replace(/\$/g,'').replace(/,/g,'').trim();
  return parseFloat(clean)||0;
}

function parseDate(str){
  if(!str) return new Date().toISOString().split('T')[0];
  str = str.trim();
  // YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
  // MM/DD/YYYY
  if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(str)){
    const [m,d,y]=str.split('/');
    return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
  }
  // "2 jun 2025" / "24 jun 2026"
  const months={ene:1,jan:1,feb:2,mar:3,abr:4,apr:4,may:5,jun:6,jul:7,ago:8,aug:8,sep:9,oct:10,nov:11,dic:12,dec:12};
  const m2 = str.toLowerCase().match(/(\d{1,2})\s+([a-z]+)\s+(\d{4})/);
  if(m2){
    const mo = months[m2[2].slice(0,3)];
    if(mo) return `${m2[3]}-${String(mo).padStart(2,'0')}-${m2[1].padStart(2,'0')}`;
  }
  return new Date().toISOString().split('T')[0];
}

/* ══════════════════════════════════════
   PARSER: Bancos — SoFi, Chase, Capital One,
   Wells Fargo, BBVA MX, Banorte, Banamex, etc.
══════════════════════════════════════ */
function parseSoFi(header, lines){
  // Detect Mexican bank format (Cargo/Abono columns)
  const hasCargo = header.includes('cargo') || header.includes('retiro') || header.includes('débito') || header.includes('debito');
  const hasAbono = header.includes('abono') || header.includes('depósito') || header.includes('deposito') || header.includes('crédito');

  if(hasCargo || hasAbono){
    parseMexicanBank(header, lines);
    return;
  }

  // Wells Fargo (separate debit/credit columns)
  const hasDebit  = header.includes('debit amount') || header.includes('withdrawals');
  const hasCredit = header.includes('credit amount') || header.includes('deposits');

  // Capital One (separate debit/credit)
  const hasCapOneDebit  = header.indexOf('debit') >= 0 && !hasCargo;
  const hasCapOneCredit = header.indexOf('credit') >= 0 && !hasAbono;

  const idx = {
    date:    ['authorized date','transaction date','date','fecha'].map(k=>header.indexOf(k)).find(i=>i>=0) ?? -1,
    posted:  ['posted date','post date'].map(k=>header.indexOf(k)).find(i=>i>=0) ?? -1,
    account: ['account name','account'].map(k=>header.indexOf(k)).find(i=>i>=0) ?? -1,
    desc:    ['description','merchant','payee','concepto'].map(k=>header.indexOf(k)).find(i=>i>=0) ?? -1,
    cat:     ['primary category','category','type'].map(k=>header.indexOf(k)).find(i=>i>=0) ?? -1,
    detcat:  ['detailed category'].map(k=>header.indexOf(k)).find(i=>i>=0) ?? -1,
    amount:  ['amount','importe','monto'].map(k=>header.indexOf(k)).find(i=>i>=0) ?? -1,
    debit:   ['debit amount','debit','withdrawals'].map(k=>header.indexOf(k)).find(i=>i>=0) ?? -1,
    credit:  ['credit amount','credit','deposits'].map(k=>header.indexOf(k)).find(i=>i>=0) ?? -1,
  };

  parsedRows = lines.filter(l=>l.trim()).map(l=>{
    const c = parseCSVLine(l);
    let amount = 0;

    if(idx.amount >= 0 && c[idx.amount]){
      amount = parseAmount(c[idx.amount]);
    } else if(idx.debit >= 0 || idx.credit >= 0){
      // Separate debit/credit columns
      const debit  = parseAmount(c[idx.debit]  || '0');
      const credit = parseAmount(c[idx.credit] || '0');
      amount = credit > 0 ? credit : -Math.abs(debit);
    }

    return {
      date:    parseDate(c[idx.date >= 0 ? idx.date : idx.posted] || ''),
      account: idx.account >= 0 ? (c[idx.account]||'') : '',
      desc:    idx.desc >= 0 ? (c[idx.desc]||'') : '',
      cat:     idx.cat >= 0 ? (c[idx.cat]||'') : '',
      detcat:  idx.detcat >= 0 ? (c[idx.detcat]||'') : '',
      amount,
    };
  }).filter(r=>r.desc);

  classifyBankRows();
}

/* ── MEXICAN BANKS (BBVA, Banorte, Banamex, Santander MX) ── */
function parseMexicanBank(header, lines){
  const idx = {
    date:   ['fecha','date'].map(k=>header.indexOf(k)).find(i=>i>=0) ?? 0,
    desc:   ['descripción','descripcion','concepto','description'].map(k=>header.indexOf(k)).find(i=>i>=0) ?? 1,
    cargo:  ['cargo','retiro','débito','debito','debit'].map(k=>header.indexOf(k)).find(i=>i>=0) ?? -1,
    abono:  ['abono','depósito','deposito','crédito','credito','credit'].map(k=>header.indexOf(k)).find(i=>i>=0) ?? -1,
    saldo:  ['saldo','balance'].map(k=>header.indexOf(k)).find(i=>i>=0) ?? -1,
  };

  parsedRows = lines.filter(l=>l.trim()).map(l=>{
    const c = parseCSVLine(l);
    const cargo = parseAmount(c[idx.cargo] || '0');
    const abono = parseAmount(c[idx.abono] || '0');
    // Cargo = expense (negative), Abono = income (positive)
    const amount = abono > 0 ? abono : -Math.abs(cargo);

    return {
      date:    parseDate(c[idx.date]||''),
      account: 'MX',
      desc:    c[idx.desc]||'',
      cat:     '',
      detcat:  '',
      amount,
      currency: 'MXN',
    };
  }).filter(r=>r.desc && r.amount !== 0);

  classifyBankRows();
}

/* ══════════════════════════════════════
   PARSER: Manual (tu hoja)
══════════════════════════════════════ */
function parseManual(header, lines){
  const idx = {
    date:  header.indexOf('fecha'),
    desc:  header.indexOf('descripción') >= 0 ? header.indexOf('descripción') : header.indexOf('descripcion'),
    cat:   header.indexOf('categoría') >= 0 ? header.indexOf('categoría') : header.indexOf('categoria'),
    amount:header.indexOf('monto'),
  };

  parsedRows = lines.filter(l=>l.trim()).map(l=>{
    const c = parseCSVLine(l);
    return {
      date:   parseDate(c[idx.date]||''),
      desc:   c[idx.desc]||'',
      cat:    c[idx.cat]||'',
      amount: parseAmount(c[idx.amount]||'0'),
    };
  }).filter(r=>r.desc);

  // Manual sheet is all expenses — classify directly
  reviewRows = parsedRows.map(r=>({
    ...r,
    status: 'include',
    type: 'gasto',
    ftCat: mapManualCategory(r.cat),
    zelleType: null,
    isDuplicate: checkDuplicate(r.date, Math.abs(r.amount), r.desc),
    selected: true,
  }));

  renderStep3();
}

/* ══════════════════════════════════════
   PARSER: Brokers — Fidelity, Schwab, Robinhood,
   Vanguard, E*TRADE, GBM+
══════════════════════════════════════ */
function parseFidelity(header, lines){
  // Detect broker by column signatures
  const isSchwab    = header.includes('action') && header.includes('symbol') && !header.includes('run date');
  const isRobinhood = header.includes('activity date') || header.includes('trans code') || header.includes('instrument');
  const isVanguard  = header.includes('trade date') && (header.includes('transaction type') || header.includes('shares'));

  if(isSchwab && !header.includes('run date'))    { parseSchwab(header, lines); return; }
  if(isRobinhood) { parseRobinhood(header, lines); return; }
  if(isVanguard)  { parseVanguard(header, lines); return; }

  // Default: Fidelity
  const idx = {
    date:   header.indexOf('run date'),
    action: header.indexOf('action'),
    symbol: header.indexOf('symbol'),
    desc:   header.indexOf('description'),
    price:  ['price ($)','price'].map(k=>header.indexOf(k)).find(i=>i>=0) ?? -1,
    qty:    header.indexOf('quantity'),
    amount: ['amount ($)','amount'].map(k=>header.indexOf(k)).find(i=>i>=0) ?? -1,
    acct:   header.indexOf('account number'),
  };

  parsedRows = lines.filter(l=>l.trim()).map(l=>{
    const c = parseCSVLine(l);
    const action = c[idx.action]||'';
    return {
      date:   parseDate(c[idx.date >= 0 ? idx.date : 0]||''),
      action,
      symbol: (c[idx.symbol >= 0 ? idx.symbol : -1]||'').trim(),
      desc:   c[idx.desc >= 0 ? idx.desc : -1]||'',
      price:  parseFloat((c[idx.price >= 0 ? idx.price : -1]||'').replace(/[$,]/g,''))||0,
      qty:    parseFloat(c[idx.qty >= 0 ? idx.qty : -1]||'0')||0,
      amount: parseAmount(c[idx.amount >= 0 ? idx.amount : -1]||'0'),
      acct:   c[idx.acct >= 0 ? idx.acct : -1]||'',
      broker: 'Fidelity',
    };
  }).filter(r=>r.action);

  classifyBrokerRows();

function parseGeneric(header, lines){

/* ══════════════════════════════════════
   CLASSIFIERS
══════════════════════════════════════ */
const TRANSFER_KEYWORDS = [
  'transfer to','transfer from','transferencia','zelle payment to',
  'apple cash sent','venmo','paypal transfer','credit card payment',
  'debt payment','sofi credit card','capital one payment',
];
const ZELLE_KEYWORDS = ['zelle','apple cash','venmo','cash app','paypal'];
const INCOME_KEYWORDS = ['direct deposit','payroll','salary','deposit','dividend','interest paid'];

function isTransfer(row){
  const d = (row.desc+' '+row.cat+' '+row.detcat).toLowerCase();
  if(row.cat && row.cat.toLowerCase().includes('transfer')) return true;
  if(row.cat && row.cat.toLowerCase().includes('debt payment')) return true;
  return TRANSFER_KEYWORDS.some(k=>d.includes(k));
}

function isZelle(row){
  const d = row.desc.toLowerCase();
  return ZELLE_KEYWORDS.some(k=>d.includes(k));
}

function isIncome(row){
  const d = (row.desc+' '+row.cat).toLowerCase();
  return INCOME_KEYWORDS.some(k=>d.includes(k)) && row.amount > 0;
}

function classifyBankRows(){
  reviewRows = parsedRows.map(r=>{
    let status, type, selected, zelleType=null;

    if(isTransfer(r)){
      status = 'exclude'; type = 'transferencia'; selected = false;
    } else if(isZelle(r)){
      status = 'decide'; type = r.amount < 0 ? 'gasto' : 'ingreso'; selected = false; zelleType = null;
    } else if(isIncome(r)){
      status = 'include'; type = 'ingreso'; selected = true;
    } else if(r.amount < 0){
      status = 'include'; type = 'gasto'; selected = true;
    } else {
      status = 'decide'; type = 'ingreso'; selected = false;
    }

    return {
      ...r,
      status, type, selected, zelleType,
      ftCat: mapBankCategory(r.cat, r.detcat, r.desc),
      isDuplicate: checkDuplicate(r.date, Math.abs(r.amount), r.desc),
    };
  });

  renderStep3();
}

function classifyFidelityRows(){
  reviewRows = parsedRows.map(r=>{
    const action = r.action.toLowerCase();
    let status, type, selected;

    if(action.includes('electronic funds transfer') || action.includes('funds transfer')){
      status = 'exclude'; type = 'deposito'; selected = false;
    } else if(action.includes('you bought') || action.includes('bought')){
      status = 'include'; type = 'inversion'; selected = true;
    } else if(action.includes('you sold') || action.includes('sold')){
      status = 'pending'; type = 'venta'; selected = true;
    } else if(action.includes('dividend')){
      status = 'include'; type = 'ingreso'; selected = true;
    } else {
      status = 'decide'; type = 'otro'; selected = false;
    }

    // Warn about FZILX (user discarded this fund)
    const isFZILX = r.symbol === 'FZILX';

    return {
      ...r,
      status, type, selected,
      ftCat: '📈 Inversión',
      isDuplicate: false,
      isFZILX,
      sellDisposition: null, // 'reinvest' | 'withdraw' | 'cash'
    };
  });

  renderStep3();
}

function getExclusionReason(row){
  const es = lang === 'es';
  const reasons = [];
  const relatedTx = [];

  const d = (row.desc+' '+(row.cat||'')+' '+(row.detcat||'')).toLowerCase();

  if(row.cat && row.cat.toLowerCase().includes('transfer')){
    reasons.push(es ? `La categoría del banco dice "${row.cat}"` : `Bank category says "${row.cat}"`);
  }
  if(row.cat && row.cat.toLowerCase().includes('debt payment')){
    reasons.push(es ? 'Es un pago de tarjeta de crédito propia' : 'It\'s a payment to your own credit card');
  }
  TRANSFER_KEYWORDS.forEach(k=>{
    if(d.includes(k)) reasons.push(es ? `La descripción contiene "${k}"` : `Description contains "${k}"`);
  });

  // Find mirror transaction (same amount, same date, opposite sign)
  const mirror = reviewRows.filter(r2 =>
    r2 !== row &&
    r2.date === row.date &&
    Math.abs(Math.abs(r2.amount) - Math.abs(row.amount)) < 0.01 &&
    Math.sign(r2.amount) !== Math.sign(row.amount)
  );
  if(mirror.length){
    reasons.push(es ? 'Encontramos una transacción espejo del mismo monto el mismo día' : 'We found a mirror transaction for the same amount on the same day');
    mirror.forEach(m => relatedTx.push(m));
  }

  return { reasons, relatedTx };
}

function mapBankCategory(cat, detcat, desc){
  const c = (cat+' '+detcat+' '+desc).toLowerCase();
  if(c.includes('food') || c.includes('restaurant') || c.includes('bar') || c.includes('dunkin') || c.includes('mcdonald') || c.includes('taco') || c.includes('pizza')) return '🍔 Restaurantes';
  if(c.includes('grocery') || c.includes('supermarket') || c.includes('walmart') || c.includes('target') || c.includes('costco') || c.includes('cermak') || c.includes('aldi')) return '🛒 Supermercado';
  if(c.includes('gas') || c.includes('fuel') || c.includes('gasoline') || c.includes('exxon') || c.includes('shell') || c.includes('bp')) return '⛽ Gasolina';
  if(c.includes('transport') || c.includes('uber') || c.includes('lyft') || c.includes('transit') || c.includes('cta')) return '⛽ Gasolina';
  if(c.includes('health') || c.includes('medical') || c.includes('pharmacy') || c.includes('doctor') || c.includes('gym') || c.includes('fitness')) return '💊 Salud';
  if(c.includes('entertain') || c.includes('movie') || c.includes('netflix') || c.includes('spotify') || c.includes('amazon prime') || c.includes('disney')) return '🎬 Entretenimiento';
  if(c.includes('shop') || c.includes('amazon') || c.includes('clothing') || c.includes('apparel') || c.includes('fashion')) return '👕 Ropa';
  if(c.includes('utility') || c.includes('electric') || c.includes('peoples gas') || c.includes('water') || c.includes('internet') || c.includes('phone') || c.includes('comcast') || c.includes('att')) return '📱 Teléfono/Internet';
  if(c.includes('rent') || c.includes('mortgage') || c.includes('housing')) return '🏠 Renta / Hipoteca';
  return '📦 Otros';
}

function mapManualCategory(cat){
  const c = (cat||'').toLowerCase();
  if(c.includes('food')) return '🍔 Restaurantes';
  if(c.includes('transport') || c.includes('car') && !c.includes('carwash')) return '⛽ Gasolina';
  if(c.includes('health') || c.includes('beauty')) return '💊 Salud';
  if(c.includes('cloth') || c.includes('shop')) return '👕 Ropa';
  if(c.includes('entertain')) return '🎬 Entretenimiento';
  return '📦 Otros';
}

/* ══════════════════════════════════════
   DUPLICATE CHECK
══════════════════════════════════════ */
function checkDuplicate(date, amount, desc){
  const data = loadData();
  const txs = data.transactions||[];
  const dNorm = (desc||'').toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,10);
  return txs.some(t=>{
    if(t.date !== date) return false;
    if(Math.abs(parseFloat(t.amount)-amount)>0.01) return false;
    const tNorm = (t.desc||'').toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,10);
    return tNorm === dNorm;
  });
}

    const statusColor = {include:'#1A7A4A',exclude:'#E63946',decide:'#F4A261',pending:'#4A6CF7'}[r.status]||'#9395A5';
    const isPos = isFid ? (r.type==='venta'||r.type==='ingreso') : r.amount > 0;
    const amtColor = isPos ? 'var(--g-main)' : 'var(--red)';
    const amtStr = isFid
      ? (r.amount!==0 ? fmt(Math.abs(r.amount)) : `${r.qty} acc × $${r.price}`)
      : fmt(Math.abs(r.amount));
    const sign = isPos ? '+' : '-';

    let extraHtml = '';

    // Zelle decision
    if(r.status==='decide' && !isFid && isZelle(r)){
      extraHtml = `
      <div class="zelle-opts">
        <span style="font-size:10px;color:var(--text3);margin-right:4px">¿Qué fue?</span>
        <button class="zo-btn ${r.zelleType==='gasto'?'on':''}" onclick="setZelle(${globalIdx},'gasto')">💸 ${lang==='es'?'Pago':'Payment'}</button>
        <button class="zo-btn ${r.zelleType==='ingreso'?'on':''}" onclick="setZelle(${globalIdx},'ingreso')">💰 ${lang==='es'?'Cobro':'Income'}</button>
        <button class="zo-btn ${r.zelleType==='ignore'?'on':''}" onclick="setZelle(${globalIdx},'ignore')">🎁 ${lang==='es'?'Ignorar':'Ignore'}</button>
      </div>`;
    }

    // Fidelity sell disposition
    if(r.status==='pending' && r.type==='venta'){
      extraHtml = `
      <div class="zelle-opts">
        <span style="font-size:10px;color:var(--text3);margin-right:4px">${lang==='es'?'¿Qué hiciste?':'What did you do?'}</span>
        <button class="zo-btn ${r.sellDisposition==='reinvest'?'on':''}" onclick="setSell(${globalIdx},'reinvest')">🔄 ${lang==='es'?'Reinvertí':'Reinvested'}</button>
        <button class="zo-btn ${r.sellDisposition==='withdraw'?'on':''}" onclick="setSell(${globalIdx},'withdraw')">🏦 ${lang==='es'?'Retiré':'Withdrew'}</button>
        <button class="zo-btn ${r.sellDisposition==='cash'?'on':''}" onclick="setSell(${globalIdx},'cash')">💵 ${lang==='es'?'Cash en cuenta':'Cash in account'}</button>
      </div>`;
    }

    // FZILX warning
    if(r.isFZILX){
      extraHtml += `<div class="dup-warn">⚠️ ${lang==='es'?'Este fondo (FZILX) ya no está en tu portafolio actual.':'This fund (FZILX) is no longer in your current portfolio.'}</div>`;
    }

    // Duplicate warning
    if(r.isDuplicate){
      extraHtml += `<div class="dup-warn">⚠️ ${lang==='es'?'Posible duplicado — ya existe una transacción similar.':'Possible duplicate — a similar transaction already exists.'}</div>`;
    }

    return `
    <div class="tx-review-row" style="${r.status==='exclude'?'opacity:.5':''}">
      <div class="trr-check ${r.selected?'on':''}" onclick="toggleRow(${globalIdx})">
        ${r.selected?'<span style="color:white;font-size:12px;line-height:1">✓</span>':''}
      </div>
      <div class="trr-status" style="background:${statusColor}"></div>
      <div class="trr-info">
        <div class="trr-name">
          ${isFid&&r.symbol?`<strong>${r.symbol}</strong> · `:''}${r.desc||r.action||'—'}
          ${r.status==='pending'?'<span style="font-size:9px;font-weight:700;background:var(--blu-dim);color:var(--blue);padding:1px 6px;border-radius:20px;margin-left:4px">PENDIENTE</span>':''}
        </div>
        <div class="trr-meta">
          ${r.date}
          ${r.account?` · ${r.account}`:''}
          ${r.status==='exclude'
            ?` · <span style="color:var(--red);cursor:pointer;text-decoration:underline;font-weight:600" onclick="showExclusionReason(${globalIdx})">${lang==='es'?'¿Por qué? →':'Why? →'}</span>`
            :''}
        </div>
        ${extraHtml}
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div class="trr-amt" style="color:${amtColor}">${sign}${amtStr}</div>
        <div class="trr-cat" style="background:var(--off);color:var(--text3)">${r.ftCat}</div>
      </div>
    </div>`;
  }).join('');

  // Update button count
  const selected = reviewRows.filter(r=>r.selected).length;
  const btn = document.getElementById('importBtn');
  if(btn) btn.textContent = lang==='es' ? `Importar ${selected} transacciones →` : `Import ${selected} transactions →`;
}

function toggleRow(idx){
  reviewRows[idx].selected = !reviewRows[idx].selected;
  if(reviewRows[idx].selected && reviewRows[idx].status==='exclude'){
    reviewRows[idx].status = 'include';
  }
  renderTxList();
}

function toggleSelectAll(val){
  reviewRows.forEach(r=>{ if(r.status!=='exclude') r.selected=val; });
  renderTxList();
}

function setZelle(idx, type){
  reviewRows[idx].zelleType = type;
  reviewRows[idx].type = type === 'ignore' ? 'ignorar' : type;
  reviewRows[idx].selected = type !== 'ignore';
  renderTxList();
}

function setSell(idx, disp){
  reviewRows[idx].sellDisposition = disp;
  reviewRows[idx].selected = disp !== 'reinvest'; // reinvest = don't log as income
  renderTxList();
}

/* ══════════════════════════════════════
   AI FILE PROCESSOR (Premium)
══════════════════════════════════════ */
async function processAIFile(file, forcedMediaType, csvText){
  if(creditsLeft() <= 0){
    showToast(lang==='es'?'❌ Sin análisis IA disponibles este mes':'❌ No AI analyses left this month');
    renderStep2();
    return;
  }

  const zone = document.getElementById('dropZone');
  zone.innerHTML = `<div class="uz-ico">🤖</div><div class="uz-title">${lang==='es'?'Analizando con IA...':'Analyzing with AI...'}</div><div class="uz-sub">${lang==='es'?'Esto puede tomar unos segundos':'This may take a few seconds'}</div>`;

  try {
    const isCSVText = forcedMediaType === 'text/csv' && csvText;
    const isImage = !isCSVText && file.type.startsWith('image/');
    const isPDF = !isCSVText && file.type === 'application/pdf';

    const basePrompt = `Extract ALL transactions from this financial document.
Respond ONLY with a raw JSON array, no markdown, no explanation:
[
  {
    "date": "YYYY-MM-DD",
    "description": "merchant or description",
    "amount": -10.50,
    "category": "one of: Restaurantes, Supermercado, Gasolina, Salud, Entretenimiento, Ropa, Servicios, Inversión, Ingreso, Otros",
    "type": "gasto or ingreso or inversion or venta",
    "is_transfer": false,
    "ticker": ""
  }
]
Rules:
- Negative amounts = expenses/purchases
- Positive amounts = income/deposits
- Mark transfers between own accounts with "is_transfer": true
- For investments: fill "ticker" with the stock symbol (NVDA, AAPL, etc.)
- Ignore "Electronic Funds Transfer" lines (internal deposits to brokerage)
- Today is ${new Date().toISOString().split('T')[0]}`;

    let requestBody;

    if(isCSVText){
      // CSV as plain text — send as text message (no image)
      const truncated = csvText.slice(0, 8000); // Claude context limit safety
      requestBody = {
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 4000,
        messages: [{
          role: 'user',
          content: `${basePrompt}\n\nHere is the CSV content:\n\`\`\`\n${truncated}\n\`\`\``
        }]
      };
    } else {
      // Image or PDF
      let b64, mediaType;
      if(isImage){
        b64 = await compressAndEncode(file);
        mediaType = 'image/jpeg';
      } else {
        // PDF
        const buf = await file.arrayBuffer();
        const bytes = new Uint8Array(buf);
        let bin = '';
        for(let i=0;i<bytes.length;i++) bin += String.fromCharCode(bytes[i]);
        b64 = btoa(bin);
        mediaType = 'application/pdf';
      }

      requestBody = {
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 4000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: mediaType, data: b64 } },
            { type: 'text', text: basePrompt }
          ]
        }]
      };
    }

    // Call API via Vercel Function
    const res = await fetch('/api/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        image: requestBody.messages[0].content?.[0]?.source?.data || null,
        mediaType: requestBody.messages[0].content?.[0]?.source?.media_type || null,
        prompt: isCSVText ? `${basePrompt}\n\nHere is the CSV content:\n\`\`\`\n${csvText.slice(0,8000)}\n\`\`\`` : basePrompt,
        isTextOnly: isCSVText,
        csvContent: isCSVText ? csvText.slice(0, 8000) : null,
      })
    });

    const data = await res.json();
    useCredit();

    let rows;
    let retried = false;

    // First attempt to parse
    try {
      const raw = (data.raw||'').replace(/```json|```/g,'').trim();
      const parsed = data.result || JSON.parse(raw);
      rows = Array.isArray(parsed) ? parsed : [parsed];
    } catch(e){
      // Auto-retry with simpler prompt if first attempt fails
      if(!retried){
        retried = true;
        zone.innerHTML = `<div class="uz-ico">🤖</div><div class="uz-title">${lang==='es'?'Reintentando con formato simplificado...':'Retrying with simplified format...'}</div>`;

        const simplePrompt = isCSVText
          ? `List all transactions from this CSV. For each row, respond with just: DATE|DESCRIPTION|AMOUNT\nOne per line. Use negative amounts for expenses.\n\nCSV:\n${csvText.slice(0,4000)}`
          : `List all transactions visible in this image. For each one: DATE|DESCRIPTION|AMOUNT\nOne per line. Negative = expense.`;

        try {
          const res2 = await fetch('/api/scan', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({
              image: isCSVText ? null : requestBody?.messages?.[0]?.content?.[0]?.source?.data,
              mediaType: isCSVText ? null : 'image/jpeg',
              prompt: simplePrompt,
              isTextOnly: isCSVText,
              csvContent: isCSVText ? csvText.slice(0,4000) : null,
            })
          });
          const data2 = await res2.json();
          const raw2 = (data2.raw||data2.result||'').toString();

          // Parse pipe-separated format
          rows = raw2.split('\n').filter(l=>l.includes('|')).map(l=>{
            const parts = l.split('|');
            return {
              date: parseDate(parts[0]?.trim()||''),
              description: parts[1]?.trim()||'',
              amount: parseAmount(parts[2]?.trim()||'0'),
              category: 'Otros',
              type: parseAmount(parts[2]?.trim()||'0') < 0 ? 'gasto' : 'ingreso',
              is_transfer: false,
            };
          }).filter(r=>r.description && r.amount !== 0);

        } catch(e2){
          throw new Error(lang==='es'?'La IA no pudo extraer transacciones tras 2 intentos':'AI could not extract transactions after 2 attempts');
        }
      }
    }

    if(!rows || !rows.length) throw new Error(lang==='es'?'No se encontraron transacciones en el documento':'No transactions found in document');

    parsedRows = rows.map(r=>({
      date: parseDate(r.date||''),
      desc: r.description||'',
      cat: r.category||'Otros',
      amount: parseFloat(r.amount)||0,
      isTransfer: r.is_transfer||false,
      ticker: r.ticker||'',
      type: r.type||'gasto',
    }));

    reviewRows = parsedRows.map(r=>({
      ...r,
      status: r.isTransfer ? 'exclude' : 'include',
      type: r.type||( r.amount<0?'gasto':'ingreso'),
      ftCat: r.cat,
      zelleType: null,
      isDuplicate: checkDuplicate(r.date, Math.abs(r.amount), r.desc),
      selected: !r.isTransfer,
    }));

    renderStep3();

  } catch(err){
    const zone2 = document.getElementById('dropZone');
    const es = lang === 'es';

    // Diagnose specific error type
    let errTitle = es ? 'Error al analizar' : 'Error analyzing';
    let errMsg = err.message;
    let errTip = '';

    if(err.message.includes('API key')){
      errTitle = es ? '⚙️ Error de configuración' : '⚙️ Configuration error';
      errMsg = es ? 'La API key no está configurada correctamente.' : 'API key is not configured correctly.';
      errTip = es ? 'Contacta al soporte de FinTrack Pro.' : 'Contact FinTrack Pro support.';
    } else if(err.message.includes('413') || err.message.includes('too large') || err.message.includes('grande')){
      errTitle = es ? '📏 Archivo demasiado grande' : '📏 File too large';
      errMsg = es ? 'El archivo es muy pesado. Intenta con una imagen más pequeña o menos páginas.' : 'File is too large. Try a smaller image or fewer pages.';
    } else if(err.message.includes('429') || err.message.includes('rate')){
      errTitle = es ? '⏳ Demasiadas solicitudes' : '⏳ Too many requests';
      errMsg = es ? 'Espera unos segundos e intenta de nuevo.' : 'Wait a few seconds and try again.';
    } else if(err.message.includes('No transactions') || err.message.includes('No se encontraron')){
      errTitle = es ? '🔍 Sin transacciones detectadas' : '🔍 No transactions detected';
      errMsg = es ? '¿Es un estado de cuenta o recibo válido? Asegúrate de que la imagen sea clara.' : 'Is this a valid statement or receipt? Make sure the image is clear.';
    } else if(err.message.includes('tras 2 intentos') || err.message.includes('after 2 attempts')){
      errTitle = es ? '🤖 La IA no pudo procesar este formato' : '🤖 AI could not process this format';
      errMsg = es ? 'Prueba con el importador CSV manual o toma una foto más clara.' : 'Try the manual CSV importer or take a clearer photo.';
    }

    if(zone2) zone2.innerHTML = `
      <div class="uz-ico">❌</div>
      <div class="uz-title" style="margin-bottom:6px">${errTitle}</div>
      <div class="uz-sub" style="margin-bottom:${errTip?'4px':'12px'}">${errMsg}</div>
      ${errTip?`<div class="uz-sub" style="margin-bottom:12px;font-style:italic">${errTip}</div>`:''}
      <button class="btn-secondary" style="max-width:200px;margin:0 auto;display:block" onclick="renderStep2()">
        ${es?'← Intentar de nuevo':'← Try again'}
      </button>`;
  }
}

async function compressAndEncode(file){
  return new Promise(resolve=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        const canvas = document.createElement('canvas');
        let w=img.width, h=img.height;
        if(w>1200){ h=Math.round(h*1200/w); w=1200; }
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',0.8).split(',')[1]);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
