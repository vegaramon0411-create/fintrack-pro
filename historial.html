<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FinTrack Pro · Historial</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="premium.js"></script>
<style>
:root{--g-dark:#0F5132;--g-main:#1A7A4A;--g-light:#E8F7EF;--white:#fff;--off:#F7F8FC;--border:#E4E6F0;--text:#1A1D2E;--text2:#4A4E69;--text3:#9395A5;--red:#E63946;--red-dim:rgba(230,57,70,.1);--amber:#F4A261;--amb-dim:rgba(244,162,97,.12);--blue:#4A6CF7;--blu-dim:rgba(74,108,247,.1);--shadow:0 2px 12px rgba(0,0,0,.06);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--off);color:var(--text);min-height:100vh;padding-bottom:90px;}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-title{font-size:17px;font-weight:800;}
.page{padding:16px;}
.card{background:var(--white);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow);}
.lang-toggle{display:flex;background:var(--off);border:1px solid var(--border);border-radius:20px;overflow:hidden;font-size:11px;font-weight:700;}
.lt-opt{padding:5px 12px;cursor:pointer;color:var(--text3);}
.lt-opt.on{background:var(--g-main);color:white;}
/* Month picker */
.month-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.month-btn{background:var(--off);border:1.5px solid var(--border);border-radius:10px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.month-label{font-size:15px;font-weight:800;flex:1;text-align:center;}
/* Filter tabs */
.filter-row{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px;}
.filter-btn{flex-shrink:0;background:var(--off);border:1.5px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;color:var(--text3);font-family:inherit;}
.filter-btn.on{background:var(--g-main);border-color:var(--g-main);color:white;}
/* Tx items */
.tx-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--off);}
.tx-item:last-child{border-bottom:none;}
.tx-ico{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-size:20px;flex-shrink:0;}
.tx-info{flex:1;min-width:0;}
.tx-desc{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tx-meta{font-size:11px;color:var(--text3);}
.tx-amount{font-size:14px;font-weight:800;flex-shrink:0;}
/* Summary */
.sum-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;}
.sum-card{background:var(--off);border-radius:12px;padding:12px;text-align:center;}
.sum-val{font-size:15px;font-weight:800;}
.sum-lbl{font-size:10px;color:var(--text3);margin-top:2px;}
/* Mobile nav */
.mob-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:100;gap:0;}
.mob-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:700;color:var(--text3);cursor:pointer;padding:4px 0;}
.mob-item.on{color:var(--g-main);}
.mob-ico{font-size:22px;line-height:1.2;}
.mob-plus{width:52px;height:52px;border-radius:50%;background:var(--g-main);display:flex;align-items:center;justify-content:center;font-size:26px;color:white;margin-top:-18px;box-shadow:0 4px 14px rgba(26,122,74,.4);}
.more-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:flex-end;z-index:200;}
.more-overlay.open{display:flex;}
.more-panel{background:var(--white);width:100%;border-radius:24px 24px 0 0;padding:12px 20px calc(28px + env(safe-area-inset-bottom));}
.more-handle{width:36px;height:4px;background:var(--border);border-radius:100px;margin:0 auto 16px;}
.more-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.more-item{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
.more-ico{width:52px;height:52px;border-radius:16px;display:grid;place-items:center;font-size:24px;}
.more-item span{font-size:11px;font-weight:600;color:var(--text2);text-align:center;}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1A1D2E;color:white;padding:12px 20px;border-radius:20px;font-size:13px;font-weight:600;display:none;z-index:300;}

input, select, textarea { font-size: 16px !important; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">📅 <span data-es="Historial" data-en="History">Historial</span></div>
  <div class="lang-toggle">
    <div class="lt-opt on" id="ltES" onclick="setLang('es')">ES</div>
    <div class="lt-opt" id="ltEN" onclick="setLang('en')">EN</div>
  </div>
</div>

<div class="page">
  <!-- Month picker -->
  <div class="month-row">
    <button class="month-btn" onclick="changeMonth(-1)">◀</button>
    <div class="month-label" id="monthLabel">—</div>
    <button class="month-btn" onclick="changeMonth(1)">▶</button>
  </div>

  <!-- Summary -->
  <div class="sum-grid" id="sumGrid"></div>

  <!-- Filter tabs -->
  <div class="filter-row">
    <button class="filter-btn on" onclick="setFilter('all',this)" data-es="Todos" data-en="All">Todos</button>
    <button class="filter-btn" onclick="setFilter('gasto',this)" data-es="💸 Gastos" data-en="💸 Expenses">💸 Gastos</button>
    <button class="filter-btn" onclick="setFilter('ingreso',this)" data-es="💰 Ingresos" data-en="💰 Income">💰 Ingresos</button>
    <button class="filter-btn" onclick="setFilter('inversion',this)" data-es="📈 Inversiones" data-en="📈 Investments">📈 Inversiones</button>
    <button class="filter-btn" onclick="setFilter('hogar',this)" data-es="🏠 Hogar" data-en="🏠 Home">🏠 Hogar</button>
  </div>

  <div class="card" id="txList"></div>
</div>

<div id="toast"></div>

<!-- MORE MENU -->
<div class="more-overlay" id="moreOverlay" onclick="if(event.target===this)closeMoreMenu()">
  <div class="more-panel">
    <div class="more-handle"></div>
    <div class="more-grid">
      <div class="more-item" onclick="go('analisis.html')"><div class="more-ico" style="background:var(--g-light)">📈</div><span>Análisis</span></div>
      <div class="more-item" onclick="go('metas.html')"><div class="more-ico" style="background:var(--amb-dim)">🎯</div><span>Metas</span></div>
      <div class="more-item" onclick="go('deudas.html')"><div class="more-ico" style="background:var(--red-dim)">💳</div><span>Deudas</span></div>
      <div class="more-item" onclick="go('inversiones.html')"><div class="more-ico" style="background:var(--blu-dim)">🏦</div><span>Inversiones</span></div>
      <div class="more-item" onclick="go('scanner.html')"><div class="more-ico" style="background:rgba(123,94,167,.1)">📷</div><span>Escanear</span></div>
      <div class="more-item" onclick="go('importar.html')"><div class="more-ico" style="background:var(--blu-dim)">📥</div><span>Importar CSV</span></div>
      <div class="more-item" onclick="go('emergencia.html')"><div class="more-ico" style="background:var(--amb-dim)">🛡️</div><span>Emergencia</span></div>
      <div class="more-item" onclick="go('suscripciones.html')"><div class="more-ico" style="background:rgba(123,94,167,.1)">🔄</div><span>Suscripciones</span></div>
      <div class="more-item" onclick="go('config.html')"><div class="more-ico" style="background:var(--off)">⚙️</div><span>Config</span></div>
      <div class="more-item" onclick="go('perfil.html')"><div class="more-ico" style="background:var(--blu-dim)">👤</div><span>Perfil</span></div>
    </div>
  </div>
</div>

<nav class="mob-nav">
  <div class="mob-item" onclick="go('dashboard.html')"><div class="mob-ico">📊</div><span>Inicio</span></div>
  <div class="mob-item on"><div class="mob-ico">📅</div><span>Historial</span></div>
  <div class="mob-item" onclick="go('dashboard.html')"><div class="mob-plus">＋</div></div>
  <div class="mob-item" onclick="go('hogar.html')"><div class="mob-ico">🏠</div><span>Hogar</span></div>
  <div class="mob-item" onclick="openMoreMenu()"><div class="mob-ico">☰</div><span>Más</span></div>
</nav>

<script>
let user = {}, lang = 'es';
let selectedMonth = null;
let activeFilter = 'all';

function loadData(){ try{return JSON.parse(localStorage.getItem('ft_data'))||{transactions:[],emergency:0,subscriptions:[]};}catch(e){return{transactions:[],emergency:0,subscriptions:[]};} }
function fmt(n){ return '$'+Math.abs(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function go(url){ window.location.href=url; }
function logout(){sessionStorage.clear();['ft_user','ft_user_setup','ft_premium','ft_lang'].forEach(k=>localStorage.removeItem(k));window.location.replace('login.html');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',3000);}
function openMoreMenu(){document.getElementById('moreOverlay').classList.add('open');}
function closeMoreMenu(){document.getElementById('moreOverlay').classList.remove('open');}

const TYPE_ICO = {gasto:'💸',ingreso:'💰',inversion:'📈',ahorro:'🛡️',suscripcion:'🔄',hipoteca:'🏠'};
const TYPE_COLOR = {gasto:'var(--red)',ingreso:'var(--g-main)',inversion:'var(--blue)',ahorro:'var(--amber)',suscripcion:'var(--blue)',hipoteca:'var(--red)'};
const TYPE_BG = {gasto:'var(--red-dim)',ingreso:'var(--g-light)',inversion:'var(--blu-dim)',ahorro:'var(--amb-dim)',suscripcion:'var(--blu-dim)',hipoteca:'var(--red-dim)'};

function setLang(l){
  lang=l; localStorage.setItem('ft_lang',l);
  document.getElementById('ltES').classList.toggle('on',l==='es');
  document.getElementById('ltEN').classList.toggle('on',l==='en');
  document.querySelectorAll('[data-es]').forEach(el=>{const v=el.getAttribute('data-'+l);if(v)el.textContent=v;});
  render();
}

function changeMonth(dir){
  const parts = selectedMonth.split('-');
  const y = parseInt(parts[0]);
  const m = parseInt(parts[1]) - 1; // 0-indexed
  const d = new Date(y, m + dir, 1);
  selectedMonth = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  render();
}

function setFilter(f, btn){
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderList();
}

function render(){
  const MONTHS_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const MONTHS_EN = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const [y,m] = selectedMonth.split('-').map(Number);
  const monthNames = lang==='es' ? MONTHS_ES : MONTHS_EN;
  document.getElementById('monthLabel').textContent = `${monthNames[m-1]} ${y}`;

  const data = loadData();
  const txs = (data.transactions||[]).filter(t=>(t.date||'').startsWith(selectedMonth));

  let income=0, expense=0, invest=0;
  txs.forEach(t=>{
    const a = parseFloat(t.amount)||0;
    if(t.type==='ingreso') income+=a;
    else if(t.type==='inversion') invest+=a;
    else if(t.type==='gasto'||t.type==='suscripcion'||t.type==='hipoteca') expense+=a;
  });

  const es = lang==='es';
  document.getElementById('sumGrid').innerHTML = `
    <div class="sum-card"><div class="sum-val" style="color:var(--g-main)">${fmt(income)}</div><div class="sum-lbl">${es?'Ingresos':'Income'}</div></div>
    <div class="sum-card"><div class="sum-val" style="color:var(--red)">${fmt(expense)}</div><div class="sum-lbl">${es?'Gastos':'Expenses'}</div></div>
    <div class="sum-card"><div class="sum-val" style="color:var(--blue)">${fmt(invest)}</div><div class="sum-lbl">${es?'Inversiones':'Investments'}</div></div>
  `;

  renderList();
}

function renderList(){
  const data = loadData();
  let txs = (data.transactions||[]).filter(t=>(t.date||'').startsWith(selectedMonth));

  if(activeFilter === 'hogar'){
    txs = txs.filter(t=>t.isHogar);
  } else if(activeFilter !== 'all'){
    txs = txs.filter(t=>t.type===activeFilter);
  }

  txs.sort((a,b)=>new Date(b.date)-new Date(a.date));

  const es = lang==='es';
  const list = document.getElementById('txList');
  if(!txs.length){
    list.innerHTML = `<div style="text-align:center;padding:40px 0;color:var(--text3);font-size:13px">${es?'Sin movimientos este mes':'No transactions this month'}</div>`;
    return;
  }

  list.innerHTML = txs.map(t=>`
    <div class="tx-item">
      <div class="tx-ico" style="background:${TYPE_BG[t.type]||'var(--off)'}">
        ${t.isHogar?'🏠':(TYPE_ICO[t.type]||'📝')}
      </div>
      <div class="tx-info">
        <div class="tx-desc">${t.desc||t.description||'—'}</div>
        <div class="tx-meta">${t.category||t.type||'—'} · ${t.date||''}</div>
      </div>
      <div class="tx-amount" style="color:${t.type==='ingreso'?'var(--g-main)':'var(--red)'}">
        ${t.type==='ingreso'?'+':'-'}${fmt(parseFloat(t.amount)||0)}
      </div>
      <button data-tid="${t.id}" onclick="deleteTx(this.dataset.tid)"
        style="background:var(--red-dim);color:var(--red);border:none;border-radius:8px;padding:5px 8px;font-size:12px;cursor:pointer;font-family:inherit;flex-shrink:0;margin-left:4px">🗑</button>
    </div>
  `).join('');
}

function deleteTx(id){
  const es = lang==='es';
  if(!confirm(es?'¿Eliminar este movimiento?':'Delete this transaction?')) return;
  try{
    const data = JSON.parse(localStorage.getItem('ft_data')||'{}');
    data.transactions = (data.transactions||[]).filter(t=>String(t.id)!==String(id));
    localStorage.setItem('ft_data',JSON.stringify(data));
    render();
  }catch(e){}
}

(function init(){
  let s = localStorage.getItem('ft_user') || sessionStorage.getItem('ft_user');
  if(!s){ window.location.replace('login.html'); return; }
  try{ user=JSON.parse(s); }catch(e){ window.location.replace('login.html'); return; }
  lang = localStorage.getItem('ft_lang')||user.lang||'es';
  if(!sessionStorage.getItem('ft_user')) sessionStorage.setItem('ft_user',s);
  selectedMonth = new Date().toISOString().slice(0,7);
  setLang(lang);
})();
</script>
</body>
</html>
