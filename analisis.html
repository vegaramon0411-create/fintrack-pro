<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FinTrack Pro · Análisis</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="premium.js"></script>
<style>
:root{--g-dark:#0F5132;--g-main:#1A7A4A;--g-light:#E8F7EF;--white:#fff;--off:#F7F8FC;--border:#E4E6F0;--text:#1A1D2E;--text2:#4A4E69;--text3:#9395A5;--red:#E63946;--red-dim:rgba(230,57,70,.1);--amber:#F4A261;--blue:#4A6CF7;--shadow:0 2px 12px rgba(0,0,0,.06);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--off);color:var(--text);min-height:100vh;padding-bottom:90px;}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-title{font-size:17px;font-weight:800;}
.page{padding:16px;}
.card{background:var(--white);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow);}
.lang-toggle{display:flex;background:var(--off);border:1px solid var(--border);border-radius:20px;overflow:hidden;font-size:11px;font-weight:700;}
.lt-opt{padding:5px 12px;cursor:pointer;color:var(--text3);}
.lt-opt.on{background:var(--g-main);color:white;}
.cat-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--off);}
.cat-row:last-child{border-bottom:none;}
.cat-bar-wrap{flex:1;height:8px;background:var(--border);border-radius:100px;overflow:hidden;}
.cat-bar{height:100%;border-radius:100px;}
.mob-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:100;gap:0;}
.mob-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:700;color:var(--text3);cursor:pointer;padding:4px 0;}
.mob-item.on{color:var(--g-main);}
.mob-ico{font-size:22px;line-height:1.2;}
.mob-plus{width:52px;height:52px;border-radius:50%;background:var(--g-main);display:flex;align-items:center;justify-content:center;font-size:26px;color:white;margin-top:-18px;box-shadow:0 4px 14px rgba(26,122,74,.4);}
.more-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:flex-end;z-index:200;}
.more-overlay.open{display:flex;}
.more-panel{background:var(--white);width:100%;border-radius:24px 24px 0 0;padding:12px 20px calc(28px + env(safe-area-inset-bottom));}
.more-handle{width:36px;height:4px;background:var(--border);border-radius:100px;margin:0 auto 16px;}
.more-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.more-item{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
.more-ico{width:52px;height:52px;border-radius:16px;display:grid;place-items:center;font-size:24px;}
.more-item span{font-size:11px;font-weight:600;color:var(--text2);text-align:center;}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1A1D2E;color:white;padding:12px 20px;border-radius:20px;font-size:13px;font-weight:600;display:none;z-index:300;}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-title">📊 <span data-es="Análisis" data-en="Analysis">Análisis</span></div>
  <div class="lang-toggle">
    <div class="lt-opt on" id="ltES" onclick="setLang('es')">ES</div>
    <div class="lt-opt" id="ltEN" onclick="setLang('en')">EN</div>
  </div>
</div>

<div class="page" id="content"></div>
<div id="toast"></div>

<div class="more-overlay" id="moreOverlay" onclick="if(event.target===this)closeMoreMenu()">
  <div class="more-panel">
    <div class="more-handle"></div>
    <div class="more-grid">
      <div class="more-item" onclick="go('analisis.html')"><div class="more-ico" style="background:var(--g-light)">📈</div><span>Análisis</span></div>
      <div class="more-item" onclick="go('metas.html')"><div class="more-ico" style="background:var(--amb-dim)">🎯</div><span>Metas</span></div>
      <div class="more-item" onclick="go('deudas.html')"><div class="more-ico" style="background:var(--red-dim)">💳</div><span>Deudas</span></div>
      <div class="more-item" onclick="go('inversiones.html')"><div class="more-ico" style="background:var(--blu-dim)">🏦</div><span>Inversiones</span></div>
      <div class="more-item" onclick="go('scanner.html')"><div class="more-ico" style="background:rgba(123,94,167,.1)">📷</div><span>Escanear</span></div>
      <div class="more-item" onclick="go('importar.html')"><div class="more-ico" style="background:var(--blu-dim)">📥</div><span>Importar CSV</span></div>
      <div class="more-item" onclick="go('emergencia.html')"><div class="more-ico" style="background:var(--amb-dim)">🛡️</div><span>Emergencia</span></div>
      <div class="more-item" onclick="go('suscripciones.html')"><div class="more-ico" style="background:rgba(123,94,167,.1)">🔄</div><span>Suscripciones</span></div>
      <div class="more-item" onclick="go('config.html')"><div class="more-ico" style="background:var(--off)">⚙️</div><span>Config</span></div>
      <div class="more-item" onclick="go('perfil.html')"><div class="more-ico" style="background:var(--blu-dim)">👤</div><span>Perfil</span></div>
    </div>
  </div>
</div>

<nav class="mob-nav">
  <div class="mob-item" onclick="go('dashboard.html')"><div class="mob-ico">📊</div><span>Inicio</span></div>
  <div class="mob-item" onclick="go('historial.html')"><div class="mob-ico">📅</div><span>Historial</span></div>
  <div class="mob-item" onclick="go('dashboard.html')"><div class="mob-plus">＋</div></div>
  <div class="mob-item" onclick="go('hogar.html')"><div class="mob-ico">🏠</div><span>Hogar</span></div>
  <div class="mob-item" onclick="openMoreMenu()"><div class="mob-ico">☰</div><span>Más</span></div>
</nav>

<script>
let user={},lang='es';
const COLORS=['#1A7A4A','#E63946','#4A6CF7','#F4A261','#7B5EA7','#2EC4B6','#FF6B6B','#A8DADC'];

function loadData(){ try{return JSON.parse(localStorage.getItem('ft_data'))||{transactions:[],emergency:0,subscriptions:[]};}catch(e){return{transactions:[],emergency:0,subscriptions:[]};} }
function fmt(n){ return '$'+Math.abs(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function go(url){ window.location.href=url; }
function logout(){sessionStorage.clear();['ft_user','ft_user_setup','ft_premium','ft_lang'].forEach(k=>localStorage.removeItem(k));window.location.replace('login.html');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',3000);}
function openMoreMenu(){document.getElementById('moreOverlay').classList.add('open');}
function closeMoreMenu(){document.getElementById('moreOverlay').classList.remove('open');}

function setLang(l){
  lang=l;localStorage.setItem('ft_lang',l);
  document.getElementById('ltES').classList.toggle('on',l==='es');
  document.getElementById('ltEN').classList.toggle('on',l==='en');
  document.querySelectorAll('[data-es]').forEach(el=>{const v=el.getAttribute('data-'+l);if(v)el.textContent=v;});
  render();
}

function render(){
  const data=loadData();
  const es=lang==='es';
  const now=new Date();
  const month=now.toISOString().slice(0,7);
  const txs=(data.transactions||[]).filter(t=>(t.date||'').startsWith(month));

  let income=0,expenses=0;
  const catMap={};
  txs.forEach(t=>{
    const a=parseFloat(t.amount)||0;
    if(t.type==='ingreso'){ income+=a; return; }
    if(t.type==='gasto'||t.type==='suscripcion'||t.type==='hipoteca'){
      expenses+=a;
      const cat=t.category||t.cat||t.type||'Otro';
      catMap[cat]=(catMap[cat]||0)+a;
    }
  });

  const cats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const maxCat=cats[0]?cats[0][1]:1;

  document.getElementById('content').innerHTML=`
    <div class="card">
      <div style="font-size:13px;font-weight:800;margin-bottom:14px">📅 ${es?'Resumen del mes':'Month summary'}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div style="background:var(--g-light);border-radius:12px;padding:12px;text-align:center">
          <div style="font-size:18px;font-weight:800;color:var(--g-main)">${fmt(income)}</div>
          <div style="font-size:10px;color:var(--g-dark)">${es?'Ingresos':'Income'}</div>
        </div>
        <div style="background:var(--red-dim);border-radius:12px;padding:12px;text-align:center">
          <div style="font-size:18px;font-weight:800;color:var(--red)">${fmt(expenses)}</div>
          <div style="font-size:10px;color:var(--red)">${es?'Gastos':'Expenses'}</div>
        </div>
      </div>
      ${income>0?`
      <div style="margin-top:14px">
        <div style="display:flex;justify-content:space-between;font-size:11px;font-weight:700;margin-bottom:6px">
          <span>${es?'Ahorro potencial':'Potential savings'}</span>
          <span style="color:${income>expenses?'var(--g-main)':'var(--red)'}">${fmt(income-expenses)}</span>
        </div>
        <div style="background:var(--border);border-radius:100px;height:8px;overflow:hidden">
          <div style="height:100%;background:${income>expenses?'var(--g-main)':'var(--red)'};width:${Math.min(100,(expenses/income)*100).toFixed(0)}%;border-radius:100px"></div>
        </div>
      </div>`:''}
    </div>

    ${cats.length?`
    <div class="card">
      <div style="font-size:13px;font-weight:800;margin-bottom:14px">🏷️ ${es?'Gastos por categoría':'Expenses by category'}</div>
      ${cats.map(([cat,amt],i)=>`
      <div class="cat-row">
        <div style="font-size:12px;font-weight:600;width:90px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${cat}</div>
        <div class="cat-bar-wrap"><div class="cat-bar" style="width:${(amt/maxCat*100).toFixed(0)}%;background:${COLORS[i%COLORS.length]}"></div></div>
        <div style="font-size:12px;font-weight:800;flex-shrink:0;width:70px;text-align:right">${fmt(amt)}</div>
      </div>`).join('')}
    </div>`:`
    <div class="card" style="text-align:center;padding:40px 20px">
      <div style="font-size:36px;margin-bottom:10px">📊</div>
      <div style="font-size:13px;color:var(--text3)">${es?'Sin gastos este mes':'No expenses this month'}</div>
    </div>`}
  `;
}

(function init(){
  let s=localStorage.getItem('ft_user')||sessionStorage.getItem('ft_user');
  if(!s){ window.location.replace('login.html'); return; }
  try{ user=JSON.parse(s); }catch(e){ window.location.replace('login.html'); return; }
  lang=user.lang||localStorage.getItem('ft_lang')||'es';
  if(!sessionStorage.getItem('ft_user')) sessionStorage.setItem('ft_user',s);
  setLang(lang);
})();
</script>
</body>
</html>
