<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FinTrack Pro · Suscripciones</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="premium.js"></script>
<style>
:root{--g-dark:#0F5132;--g-main:#1A7A4A;--g-light:#E8F7EF;--white:#fff;--off:#F7F8FC;--border:#E4E6F0;--text:#1A1D2E;--text2:#4A4E69;--text3:#9395A5;--red:#E63946;--red-dim:rgba(230,57,70,.1);--amber:#F4A261;--amb-dim:rgba(244,162,97,.12);--blue:#4A6CF7;--blu-dim:rgba(74,108,247,.1);--shadow:0 2px 12px rgba(0,0,0,.06);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--off);color:var(--text);min-height:100vh;padding-bottom:90px;}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-title{font-size:17px;font-weight:800;}
.page{padding:16px;}
.card{background:var(--white);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow);}
.lang-toggle{display:flex;background:var(--off);border:1px solid var(--border);border-radius:20px;overflow:hidden;font-size:11px;font-weight:700;}
.lt-opt{padding:5px 12px;cursor:pointer;color:var(--text3);}
.lt-opt.on{background:var(--g-main);color:white;}
.btn{border:none;border-radius:12px;padding:11px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-primary{background:var(--blue);color:white;}
.filter-row{display:flex;gap:6px;margin-bottom:14px;}
.filter-btn{flex-shrink:0;background:var(--off);border:1.5px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;color:var(--text3);font-family:inherit;}
.filter-btn.on{background:var(--blue);border-color:var(--blue);color:white;}
.sub-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--off);}
.sub-item:last-child{border-bottom:none;}
.sub-ico{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:20px;background:var(--blu-dim);}
.sub-info{flex:1;}
.sub-name{font-size:13px;font-weight:700;}
.sub-meta{font-size:11px;color:var(--text3);}
.sub-amount{font-size:14px;font-weight:800;color:var(--blue);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;place-items:center;z-index:150;}
.overlay.open{display:grid;}
.modal{background:var(--white);border-radius:20px;width:min(480px,calc(100vw - 24px));max-height:88vh;overflow-y:auto;padding:20px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.field input,.field select{width:100%;background:var(--off);border:1.5px solid var(--border);border-radius:10px;padding:11px 13px;font-size:14px;font-family:inherit;outline:none;}
.field input:focus,.field select:focus{border-color:var(--blue);}
.mob-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:100;gap:0;}
.mob-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:700;color:var(--text3);cursor:pointer;padding:4px 0;}
.mob-item.on{color:var(--g-main);}
.mob-ico{font-size:22px;line-height:1.2;}
.mob-plus{width:52px;height:52px;border-radius:50%;background:var(--g-main);display:flex;align-items:center;justify-content:center;font-size:26px;color:white;margin-top:-18px;box-shadow:0 4px 14px rgba(26,122,74,.4);}
.more-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:flex-end;z-index:200;}
.more-overlay.open{display:flex;}
.more-panel{background:var(--white);width:100%;border-radius:24px 24px 0 0;padding:12px 20px calc(28px + env(safe-area-inset-bottom));}
.more-handle{width:36px;height:4px;background:var(--border);border-radius:100px;margin:0 auto 16px;}
.more-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.more-item{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
.more-ico{width:52px;height:52px;border-radius:16px;display:grid;place-items:center;font-size:24px;}
.more-item span{font-size:11px;font-weight:600;color:var(--text2);text-align:center;}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1A1D2E;color:white;padding:12px 20px;border-radius:20px;font-size:13px;font-weight:600;display:none;z-index:300;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">🔄 <span data-es="Suscripciones" data-en="Subscriptions">Suscripciones</span></div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="lang-toggle">
      <div class="lt-opt on" id="ltES" onclick="setLang('es')">ES</div>
      <div class="lt-opt" id="ltEN" onclick="setLang('en')">EN</div>
    </div>
    <button class="btn btn-primary" onclick="openAdd()" style="padding:8px 14px" data-es="+ Nueva" data-en="+ New">+ Nueva</button>
  </div>
</div>

<div class="page">
  <div id="summaryCard" class="card"></div>
  <div class="filter-row">
    <button class="filter-btn on" onclick="setFilter('all',this)" data-es="Todas" data-en="All">Todas</button>
    <button class="filter-btn" onclick="setFilter('monthly',this)" data-es="Mensuales" data-en="Monthly">Mensuales</button>
    <button class="filter-btn" onclick="setFilter('annual',this)" data-es="Anuales" data-en="Annual">Anuales</button>
  </div>
  <div class="card" id="subList"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-size:16px;font-weight:800" id="modalTitle">Nueva suscripción</div>
      <div onclick="closeModal()" style="cursor:pointer;font-size:20px;color:var(--text3)">✕</div>
    </div>
    <div class="field"><label>Nombre</label><input type="text" id="fName" placeholder="Netflix, Spotify..."></div>
    <div class="field"><label>Monto ($)</label><input type="number" id="fAmount" placeholder="0.00" step="0.01" min="0"></div>
    <div class="field">
      <label data-es="Frecuencia" data-en="Frequency">Frecuencia</label>
      <select id="fFreq">
        <option value="monthly" data-es="Mensual" data-en="Monthly">Mensual</option>
        <option value="annual" data-es="Anual" data-en="Annual">Anual</option>
        <option value="weekly" data-es="Semanal" data-en="Weekly">Semanal</option>
      </select>
    </div>
    <div class="field">
      <label data-es="Fecha de cobro" data-en="Billing date">Fecha de cobro</label>
      <input type="date" id="fDate">
    </div>
    <div class="field"><label>Categoría</label>
      <select id="fCat">
        <option>Entretenimiento</option><option>Música</option><option>Trabajo</option>
        <option>Salud</option><option>Fitness</option><option>Cloud/Tech</option><option>Otro</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="saveSub()" style="width:100%;margin-bottom:8px">Guardar</button>
    <button class="btn" style="width:100%;background:var(--off);border:1.5px solid var(--border)" onclick="closeModal()">Cancelar</button>
  </div>
</div>

<div id="toast"></div>

<div class="more-overlay" id="moreOverlay" onclick="if(event.target===this)closeMoreMenu()">
  <div class="more-panel">
    <div class="more-handle"></div>
    <div class="more-grid">
      <div class="more-item" onclick="go('analisis.html')"><div class="more-ico" style="background:var(--g-light)">📈</div><span>Análisis</span></div>
      <div class="more-item" onclick="go('metas.html')"><div class="more-ico" style="background:var(--amb-dim)">🎯</div><span>Metas</span></div>
      <div class="more-item" onclick="go('deudas.html')"><div class="more-ico" style="background:var(--red-dim)">💳</div><span>Deudas</span></div>
      <div class="more-item" onclick="go('inversiones.html')"><div class="more-ico" style="background:var(--blu-dim)">🏦</div><span>Inversiones</span></div>
      <div class="more-item" onclick="go('scanner.html')"><div class="more-ico" style="background:rgba(123,94,167,.1)">📷</div><span>Escanear</span></div>
      <div class="more-item" onclick="go('importar.html')"><div class="more-ico" style="background:var(--blu-dim)">📥</div><span>Importar CSV</span></div>
      <div class="more-item" onclick="go('emergencia.html')"><div class="more-ico" style="background:var(--amb-dim)">🛡️</div><span>Emergencia</span></div>
      <div class="more-item" onclick="go('suscripciones.html')"><div class="more-ico" style="background:rgba(123,94,167,.1)">🔄</div><span>Suscripciones</span></div>
      <div class="more-item" onclick="go('config.html')"><div class="more-ico" style="background:var(--off)">⚙️</div><span>Config</span></div>
      <div class="more-item" onclick="go('perfil.html')"><div class="more-ico" style="background:var(--blu-dim)">👤</div><span>Perfil</span></div>
    </div>
  </div>
</div>

<nav class="mob-nav">
  <div class="mob-item" onclick="go('dashboard.html')"><div class="mob-ico">📊</div><span>Inicio</span></div>
  <div class="mob-item" onclick="go('historial.html')"><div class="mob-ico">📅</div><span>Historial</span></div>
  <div class="mob-item" onclick="go('dashboard.html')"><div class="mob-plus">＋</div></div>
  <div class="mob-item" onclick="go('hogar.html')"><div class="mob-ico">🏠</div><span>Hogar</span></div>
  <div class="mob-item" onclick="openMoreMenu()"><div class="mob-ico">☰</div><span>Más</span></div>
</nav>

<script>
let user={},lang='es',filterMode='all';
let editingId=null;
const KEY='ft_subs';

function loadSubs(){ try{return JSON.parse(localStorage.getItem(KEY))||[];}catch(e){return[];} }
function saveSubs(d){ localStorage.setItem(KEY,JSON.stringify(d)); }
function fmt(n){ return '$'+Math.abs(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function go(url){ window.location.href=url; }
function logout(){sessionStorage.clear();['ft_user','ft_user_setup','ft_premium','ft_lang'].forEach(k=>localStorage.removeItem(k));window.location.replace('login.html');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',3000);}
function openMoreMenu(){document.getElementById('moreOverlay').classList.add('open');}
function closeMoreMenu(){document.getElementById('moreOverlay').classList.remove('open');}

function setLang(l){
  lang=l;localStorage.setItem('ft_lang',l);
  document.getElementById('ltES').classList.toggle('on',l==='es');
  document.getElementById('ltEN').classList.toggle('on',l==='en');
  document.querySelectorAll('[data-es]').forEach(el=>{const v=el.getAttribute('data-'+l);if(v)el.textContent=v;});
  render();
}

function setFilter(f,btn){
  filterMode=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function toMonthly(s){ if(s.freq==='annual') return (parseFloat(s.amount)||0)/12; if(s.freq==='weekly') return (parseFloat(s.amount)||0)*4.33; return parseFloat(s.amount)||0; }

function render(){
  const subs=loadSubs();
  const es=lang==='es';
  let filtered=subs;
  if(filterMode!=='all') filtered=subs.filter(s=>s.freq===filterMode);
  const total=filtered.reduce((sum,s)=>sum+toMonthly(s),0);
  const annual=total*12;

  document.getElementById('summaryCard').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div style="text-align:center"><div style="font-size:22px;font-weight:800;color:var(--blue)">${fmt(total)}</div><div style="font-size:11px;color:var(--text3)">${es?'al mes':'per month'}</div></div>
      <div style="text-align:center"><div style="font-size:22px;font-weight:800;color:var(--red)">${fmt(annual)}</div><div style="font-size:11px;color:var(--text3)">${es?'al año':'per year'}</div></div>
    </div>`;

  const list=document.getElementById('subList');
  if(!filtered.length){ list.innerHTML=`<p style="color:var(--text3);font-size:13px;text-align:center;padding:30px 0">${es?'Sin suscripciones':'No subscriptions'}</p>`; return; }

  const FREQ_LABEL={monthly:es?'Mensual':'Monthly',annual:es?'Anual':'Annual',weekly:es?'Semanal':'Weekly'};
  list.innerHTML=filtered.map(s=>`
    <div class="sub-item">
      <div class="sub-ico">🔄</div>
      <div class="sub-info">
        <div class="sub-name">${s.name||'Suscripción'}</div>
        <div class="sub-meta">${FREQ_LABEL[s.freq]||s.freq} · ${s.cat||''} ${s.date?'· '+s.date:''}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="sub-amount">${fmt(parseFloat(s.amount)||0)}</div>
        <div onclick="deleteSub('${s.id}')" style="cursor:pointer;color:var(--text3)">🗑️</div>
      </div>
    </div>`).join('');
}

function openAdd(){
  editingId=null;
  ['fName','fAmount'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fDate').value=new Date().toISOString().slice(0,10);
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); }

function saveSub(){
  const name=document.getElementById('fName').value.trim();
  const amount=parseFloat(document.getElementById('fAmount').value)||0;
  const freq=document.getElementById('fFreq').value;
  const date=document.getElementById('fDate').value;
  const cat=document.getElementById('fCat').value;
  if(!name||!amount){ showToast('⚠️ '+(lang==='es'?'Llena todos los campos':'Fill all fields')); return; }
  const subs=loadSubs();
  subs.push({id:'s_'+Date.now(),name,amount,freq,date,cat});
  saveSubs(subs);
  closeModal();
  render();
  showToast(lang==='es'?'✅ Suscripción guardada':'✅ Subscription saved');
}

function deleteSub(id){
  if(!confirm(lang==='es'?'¿Eliminar?':'Delete?')) return;
  saveSubs(loadSubs().filter(s=>s.id!==id));
  render();
}

(function init(){
  let s=localStorage.getItem('ft_user')||sessionStorage.getItem('ft_user');
  if(!s){ window.location.replace('login.html'); return; }
  try{ user=JSON.parse(s); }catch(e){ window.location.replace('login.html'); return; }
  lang=localStorage.getItem('ft_lang')||user.lang||'es';
  if(!sessionStorage.getItem('ft_user')) sessionStorage.setItem('ft_user',s);
  setLang(lang);
})();
</script>
</body>
</html>
